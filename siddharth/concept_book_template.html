<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept Book Template</title>
  <style>
    :root { --ink:#222; --muted:#666; --line:#cfcfcf; --accent:#1f4e79; }
    * { box-sizing:border-box; }
    body { font-family: Arial, sans-serif; color:var(--ink); margin:0; background:#f5f7fb; }
    .sheet { max-width:900px; margin:24px auto; background:#fff; border:1px solid #ddd; padding:28px; }
    h1 { margin:0 0 6px; color:var(--accent); font-size:28px; }
    .sub { color:var(--muted); margin-bottom:18px; }
    .meta { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .line { border:1px solid var(--line); min-height:36px; padding:8px; }
    .box { border:1px solid var(--line); padding:12px; margin-top:12px; }
    .label { font-weight:700; margin-bottom:8px; }
    .entry { border-bottom:1px dashed var(--line); min-height:28px; margin-bottom:8px; }
    .entry:last-child { margin-bottom:0; }
    .score { display:flex; gap:10px; align-items:center; margin-top:8px; }
    .tiny { color:var(--muted); font-size:13px; }
    .actions { margin:14px 0 0; display:flex; gap:8px; }
    button { border:1px solid #999; background:#fff; padding:8px 12px; cursor:pointer; }
    @media print {
      body { background:#fff; }
      .sheet { border:none; margin:0; max-width:none; padding:12mm; }
      .actions { display:none; }
      @page { size:A4; margin:12mm; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <h1>Concept Book Template</h1>
    <div class="sub">Use this for definitions, formulas, and core understanding.</div>

    <div class="meta">
      <div class="line"><strong>Topic:</strong></div>
      <div class="line"><strong>Date:</strong></div>
    </div>

    <div class="box">
      <div class="label">5 Key Ideas</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">Core Formulas / Identities</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">3 Common Traps</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">2 Mini Examples</div>
      <div class="entry" style="min-height:46px;"></div>
      <div class="entry" style="min-height:46px;"></div>
    </div>

    <div class="box">
      <div class="label">Quick Drill</div>
      <div class="score"><strong>5-question score:</strong> ____ / 5</div>
      <div class="tiny">Target: 4/5 or 5/5 before moving forward.</div>
    </div>

    <div class="actions">
      <button onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>
</body>
</html>
