<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error Book Template</title>
  <style>
    :root { --ink:#222; --muted:#666; --line:#cfcfcf; --accent:#8b0000; }
    * { box-sizing:border-box; }
    body { font-family: Arial, sans-serif; color:var(--ink); margin:0; background:#fbf6f6; }
    .sheet { max-width:900px; margin:24px auto; background:#fff; border:1px solid #ddd; padding:28px; }
    h1 { margin:0 0 6px; color:var(--accent); font-size:28px; }
    .sub { color:var(--muted); margin-bottom:18px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .line { border:1px solid var(--line); min-height:38px; padding:8px; margin-bottom:10px; }
    .box { border:1px solid var(--line); padding:12px; margin-top:10px; }
    .label { font-weight:700; margin-bottom:8px; }
    .entry { border-bottom:1px dashed var(--line); min-height:28px; margin-bottom:8px; }
    .entry:last-child { margin-bottom:0; }
    .checks { display:flex; flex-wrap:wrap; gap:14px; margin-top:8px; }
    .recheck { border:1px solid var(--line); padding:10px; margin-top:10px; }
    .actions { margin-top:14px; }
    button { border:1px solid #999; background:#fff; padding:8px 12px; cursor:pointer; }
    @media print {
      body { background:#fff; }
      .sheet { border:none; margin:0; max-width:none; padding:12mm; }
      .actions { display:none; }
      @page { size:A4; margin:12mm; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <h1>Error Book Template</h1>
    <div class="sub">Most important notebook: convert mistakes into marks.</div>

    <div class="grid">
      <div class="line"><strong>Date:</strong></div>
      <div class="line"><strong>Topic:</strong></div>
    </div>
    <div class="line"><strong>Question Source:</strong></div>
    <div class="line"><strong>My Wrong Answer:</strong></div>

    <div class="box">
      <div class="label">Error Type</div>
      <div class="checks">
        <label><input type="checkbox" /> Concept</label>
        <label><input type="checkbox" /> Algebra</label>
        <label><input type="checkbox" /> Sign</label>
        <label><input type="checkbox" /> Graph</label>
        <label><input type="checkbox" /> Time pressure</label>
      </div>
    </div>

    <div class="box">
      <div class="label">Why I Made This Error</div>
      <div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">Correct Solution (3-5 lines)</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">Next-Time Trigger Sentence</div>
      <div class="entry"></div>
    </div>

    <div class="recheck">
      <strong>Recheck Dates:</strong> 1 day: _______ &nbsp;&nbsp; 7 days: _______ &nbsp;&nbsp; 21 days: _______
    </div>

    <div class="actions">
      <button onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>
</body>
</html>
