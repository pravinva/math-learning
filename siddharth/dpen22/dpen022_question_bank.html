<style>
:root{

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Georgia, 'Times New Roman', serif;
  background:

    var(--paper);
  color:var(--ink);
  min-height:100vh;
}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
header{
  border-bottom:3px solid var(--ink);
  padding-bottom:14px;
  margin-bottom:20px;
}
header h1{
  font-size:1.7rem;
  margin:0 0 4px;
  letter-spacing:0.5px;
}
header .sub{
  font-family:'Trebuchet MS', sans-serif;
  color:var(--ink-soft);
  font-size:0.92rem;
}
nav.topics{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}
nav.topics button{
  font-family:'Trebuchet MS', sans-serif;
  font-size:0.82rem;
  padding:8px 12px;
  border:1.5px solid var(--ink);
  background:var(--paper);
  color:var(--ink);
  border-radius:3px;
  cursor:pointer;
  transition:all .15s ease;
}
nav.topics button.active{
  background:var(--ink);
  color:var(--paper);
}
nav.topics button:hover:not(.active){
  background:var(--accent-soft);
}
.setbar{
  display:flex;
  gap:6px;
  margin-bottom:18px;
  align-items:center;
  font-family:'Trebuchet MS', sans-serif;
}
.setbar .label{
  font-size:0.8rem;
  color:var(--ink-soft);
  margin-right:6px;
}
.setbar button{
  width:34px;height:34px;
  border-radius:50%;
  border:1.5px solid var(--accent);
  background:var(--paper);
  color:var(--accent);
  font-weight:bold;
  cursor:pointer;
}
.setbar button.active{
  background:var(--accent);
  color:#fff;
}
.progress{
  font-family:'Trebuchet MS', sans-serif;
  font-size:0.78rem;
  color:var(--ink-soft);
  margin-left:auto;
}
.qcard{
  background:#FFFEFB;
  border:1px solid var(--grid);
  border-left:4px solid var(--accent);
  border-radius:2px;
  padding:14px 16px;
  margin-bottom:10px;
}
.qcard .qnum{
  font-family:'Trebuchet MS', sans-serif;
  font-size:0.72rem;
  color:var(--accent);
  font-weight:bold;
  letter-spacing:1px;
}
.qcard .qtext{
  margin:6px 0 8px;
  font-size:1.02rem;
  line-height:1.5;
}
.qcard button.reveal{
  font-family:'Trebuchet MS', sans-serif;
  font-size:0.76rem;
  background:none;
  border:1px solid var(--ink-soft);
  color:var(--ink-soft);
  padding:4px 10px;
  border-radius:12px;
  cursor:pointer;
}
.qcard .answer{
  display:none;
  margin-top:10px;
  padding:10px 12px;
  background:var(--correct-bg);
  border-left:3px solid var(--correct);
  border-radius:2px;
  font-size:0.95rem;
  color:#20402d;
}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{
  text-align:center;
  font-family:'Trebuchet MS', sans-serif;
  font-size:0.78rem;
  color:var(--ink-soft);
  margin-top:24px;
}
</style>
</head>

["Find the area under \\(y=6-2x\\) from \\(x=0\\) to \\(x=3\\)","\\(\\int_0^3(6-2x)dx=[6x-x^2]_0^3\\). Answer: \\(9\\)"],
["Find the average value of \\(f(x)=\\sin x\\) on \\([0,\\pi]\\)","\\(\\tfrac1\\pi\\int_0^\\pi\\sin x\\,dx=\\tfrac1\\pi(2)\\). Answer: \\(2/\\pi\\)"],
["Use FTC1 to find \\(\\dfrac{d}{dx}\\int_3^x (2t-1)\\,dt\\)","Direct application of FTC part 1. Answer: \\(2x-1\\)"],
["Find the area between \\(y=8-x^2\\) and \\(y=x^2\\) (their intersection points)","Intersect at \\(x=\\pm2\\): \\(\\int_{-2}^2(8-2x^2)dx\\). Answer: \\(\\tfrac{64}{3}\\)"],
["Find the area under \\(y=x^2+1\\) from \\(x=-1\\) to \\(x=1\\)","\\(\\int_{-1}^1(x^2+1)dx=[x^3/3+x]_{-1}^1\\). Answer: \\(\\tfrac{8}{3}\\)"],
["Use FTC1 + chain rule to find \\(\\dfrac{d}{dx}\\int_0^{\\ln x} e^t\\,dt\\)","Chain rule: \\(e^{\\ln x}\\cdot(1/x)=x\\cdot(1/x)\\). Answer: \\(1\\)"],
["Find the total area between \\(y=x^3-x\\) and the x-axis on \\([-1,1]\\)","Odd function, two equal symmetric lobes. Answer: \\(\\tfrac12\\)"],
["Find the area under \\(y=1/(1+x^2)\\) from \\(x=0\\) to \\(x=1\\)","\\(\\int_0^1 \\tfrac{1}{1+x^2}dx=[\\arctan x]_0^1\\). Answer: \\(\\pi/4\\)"],
["Use the Leibniz rule to find \\(\\dfrac{d}{dx}\\int_x^{2x} t^2\\,dt\\)","\\(\\tfrac{d}{dx}\\big[F(2x)-F(x)\\big]=2(2x)^2-x^2\\). Answer: \\(7x^2\\)"],
["Find \\(c\\) such that the average value of \\(f(x)=x^2\\) on \\([0,2]\\) equals \\(f(c)\\)","Average \\(=\\tfrac12\\int_0^2x^2dx=\\tfrac43\\); solve \\(c^2=4/3\\) on \\([0,2]\\). Answer: \\(c=2/\\sqrt3\\)"]
]
]
};

const topics = Object.keys(DATA);
let currentTopic = 0;
let currentSet = 0;

function render(){
  const nav = document.getElementById('topicNav');
  nav.innerHTML = '';
  topics.forEach((t,i)=>{
    const b = document.createElement('button');
    b.textContent = t;
    if(i===currentTopic) b.classList.add('active');
    b.onclick = ()=>{ currentTopic=i; currentSet=0; render(); };
    nav.appendChild(b);
  });

  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  DATA[topics[currentTopic]].forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===currentSet) b.classList.add('active');
    b.onclick = ()=>{ currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `${topics[currentTopic]} · Set ${currentSet+1} of 4 · 12 questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  DATA[topics[currentTopic]][currentSet].forEach((pair,i)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qnum">QUESTION ${i+1}</div>
      <div class="qtext">${pair[0]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${pair[1]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });

  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise();
  }
}
render();
</script>
</body>
</html>
