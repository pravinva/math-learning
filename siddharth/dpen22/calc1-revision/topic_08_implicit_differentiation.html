<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Implicit Differentiation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Implicit Differentiation</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find \\(dy/dx\\) if \\(x^2+y^2=25\\).", "Differentiate both sides. Answer: \\(y'=-x/y\\)"], ["TANGENT LINE", "Find the tangent line to \\(x^2+y^2=25\\) at \\((3,4)\\).", "Slope \\(=-3/4\\). Answer: \\(y-4=-\\tfrac34(x-3)\\)"], ["MIXED TERMS", "Find \\(dy/dx\\) if \\(x^3+y^3=6xy\\) (folium of Descartes).", "Differentiate implicitly and collect \\(y'\\) terms. Answer: \\(y'=\\dfrac{y-x^2}{y^2-x}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(y^2=x+1\\) and writes \\(d/dx(y^2)=2y\\), forgetting the chain rule factor. Correct it.", "Should be \\(2y\\cdot y'\\), not just \\(2y\\); then \\(2yy'=1\\Rightarrow y'=1/(2y)\\)."], ["CONCEPTUAL", "Explain why every term involving \\(y\\) needs an extra factor of \\(dy/dx\\) when differentiating an equation implicitly.", "Since \\(y\\) is being treated as an (unspecified) function of \\(x\\), differentiating any expression in \\(y\\) with respect to \\(x\\) requires the chain rule, contributing a factor of \\(dy/dx\\) \u2014 just as differentiating \\(g(x)\\) with respect to \\(x\\) would."], ["SECOND DERIVATIVE", "Find \\(d^2y/dx^2\\) for \\(x^2+y^2=1\\).", "First \\(y'=-x/y\\); differentiate again using the quotient rule and substitute back \\(x^2+y^2=1\\). Answer: \\(y''=-1/y^3\\)"]], [["BASIC", "Find \\(dy/dx\\) if \\(x^2y+y^3=5\\).", "Differentiate implicitly and collect \\(y'\\). Answer: \\(y'=\\dfrac{-2xy}{x^2+3y^2}\\)"], ["TANGENT LINE", "Find the tangent line to \\(xy=4\\) at \\((2,2)\\).", "\\(y'=-y/x=-1\\) at that point. Answer: \\(y=-x+4\\)"], ["MIXED TERMS", "Find \\(dy/dx\\) if \\(e^{xy}=x+y\\).", "Differentiate implicitly and collect \\(y'\\) terms. Answer: \\(y'=\\dfrac{1-ye^{xy}}{xe^{xy}-1}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(\\sin(y)=x^2\\) as \\(\\cos(y)=2x\\), forgetting \\(y'\\). Correct it.", "Should be \\(\\cos(y)y'=2x\\Rightarrow y'=2x/\\cos y\\)."], ["CONCEPTUAL", "Why can't we always solve for \\(y\\) explicitly before differentiating a relation like \\(x^5+y^5=5xy\\)?", "There's no elementary algebraic way to isolate \\(y\\) as a single formula in \\(x\\) for such equations, so implicit differentiation lets us find \\(dy/dx\\) directly from the relation without ever solving for \\(y\\)."], ["SECOND DERIVATIVE", "Find \\(y''\\) for \\(y^2=x\\), simplifying using the original equation.", "First \\(y'=1/(2y)\\); differentiate again. Answer: \\(y''=-1/(4y^3)\\)"]], [["BASIC", "Find \\(dy/dx\\) if \\(x^2-4xy+y^2=1\\).", "Differentiate implicitly and collect \\(y'\\). Answer: \\(y'=\\dfrac{2y-x}{y-2x}\\)"], ["TANGENT LINE", "Find the tangent line to \\(x^2+xy+y^2=7\\) at \\((2,1)\\).", "Slope \\(=-5/4\\) at that point. Answer: \\(y-1=-\\tfrac54(x-2)\\)"], ["MIXED TERMS", "Find \\(dy/dx\\) if \\(\\tan(xy)=x\\).", "Differentiate implicitly, using \\(\\sec^2(xy)\\) on the left. Answer: \\(y'=\\dfrac{1-y\\sec^2(xy)}{x\\sec^2(xy)}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(x^2y^2=4\\) using the product rule incorrectly, writing \\(2xy^2=0\\). Identify the missing terms and correct it.", "The full product rule gives \\(2xy^2+2x^2yy'=0\\), so \\(y'=-y/x\\)."], ["CONCEPTUAL", "Explain the geometric meaning of an implicit curve having a vertical tangent (\\(dy/dx\\) undefined) versus a horizontal tangent (\\(dy/dx=0\\)).", "A vertical tangent occurs where the denominator of the implicit derivative formula is zero (the curve momentarily runs straight up/down); a horizontal tangent occurs where the numerator is zero (the curve momentarily flattens out)."], ["SECOND DERIVATIVE", "For \\(x^2+y^2=r^2\\) (a circle of radius \\(r\\)), show that \\(y''=-r^2/y^3\\).", "Differentiate \\(y'=-x/y\\) again using the quotient rule, then substitute \\(x^2+y^2=r^2\\) to simplify."]], [["BASIC", "Find \\(dy/dx\\) if \\(\\ln(x)+\\ln(y)=xy\\).", "Differentiate implicitly and collect \\(y'\\). Answer: \\(y'=\\dfrac{y-1/x}{1/y-x}\\)"], ["TANGENT LINE", "Find the tangent line to \\(y^2=4x\\) at \\((1,2)\\).", "\\(y'=2/y=1\\) at that point. Answer: \\(y=x+1\\)"], ["MIXED TERMS", "Find \\(dy/dx\\) if \\(x^2+y^2+2xy=4\\) (recognise the left side as \\((x+y)^2\\)).", "Differentiate \\((x+y)^2=4\\) directly: \\(2(x+y)(1+y')=0\\). Answer: \\(y'=-1\\) (for \\(x+y\\ne0\\))"], ["ERROR ANALYSIS", "For \\(x^3+y^3=1\\), a student finds \\(y'=-x^2/y^2\\) but never checks where \\(y=0\\). Why does this matter?", "At points where \\(y=0\\) the formula is undefined \u2014 that's exactly where the curve has a vertical tangent, so the domain restriction isn't a minor detail but tells us where implicit differentiation's usual formula breaks down."], ["CONCEPTUAL", "Explain how implicit differentiation is really just a special case of the chain rule, using the term \\(d/dx[y^2]\\) as an example.", "Treating \\(y\\) as an unspecified function of \\(x\\), \\(d/dx[y^2]=2y\\cdot dy/dx\\) by the chain rule \u2014 exactly the same reasoning used for any composite function, just with \\(y\\) standing in for an unnamed inner function."], ["SECOND DERIVATIVE", "Find \\(y''\\) at the point \\((0,1)\\) for \\(x^2+y^2=1\\).", "\\(y'=-x/y=0\\) at that point; \\(y''=-(y^2+x^2)/y^3\\). Answer: \\(-1\\)"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
