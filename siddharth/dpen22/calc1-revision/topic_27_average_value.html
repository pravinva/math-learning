<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Average Value of a Function</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Average Value of a Function</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC APPLICATION", "Find the average value of \\(f(x)=x^2\\) on \\([0,3]\\).", "\\(\\tfrac13\\int_0^3x^2dx=\\tfrac13(9)\\). Answer: \\(3\\)"], ["FIND C \u2014 MVT FOR INTEGRALS", "Find \\(c\\in[0,3]\\) such that \\(f(c)\\) equals the average value found above.", "Solve \\(c^2=3\\). Answer: \\(c=\\sqrt3\\)"], ["APPLIED \u2014 PHYSICAL CONTEXT", "Temperature over a day is \\(T(t)=15+10\\sin(\\pi t/12)\\) for \\(0\\le t\\le24\\). Find the average temperature.", "The sine term integrates to zero over the full 24-hour period. Answer: \\(15\\)\u00b0C"], ["ERROR ANALYSIS", "A student computes the average value of \\(f(x)=x^2\\) on \\([1,4]\\) as \\((f(1)+f(4))/2=8.5\\). Why is this wrong, and what's the correct approach?", "This just averages two sample points, not the continuous behaviour over the interval; correctly, \\(\\text{avg}=\\tfrac13\\int_1^4x^2dx=\\tfrac13(21)\\). Answer: \\(7\\)"], ["CONCEPTUAL", "Explain the Mean Value Theorem for Integrals and how it guarantees a point \\(c\\) like the one above exists.", "For a continuous function on \\([a,b]\\), there's at least one point \\(c\\) where \\(f(c)\\) equals the function's average value over that interval; since the average lies between the function's min and max, and continuity means every value between min and max is achieved (IVT), some \\(c\\) must hit exactly that average."], ["APPLIED", "Hourly revenue is \\(R(t)=500+50t-2t^2\\) over a 10-hour day. Find the average hourly revenue.", "\\(\\tfrac1{10}\\int_0^{10}(500+50t-2t^2)dt=\\tfrac1{10}(6833.33)\\). Answer: \\(\\approx\\$683.33\\)"]], [["BASIC APPLICATION", "Find the average value of \\(f(x)=\\sin(x)\\) on \\([0,\\pi]\\).", "\\(\\tfrac1\\pi\\int_0^\\pi\\sin x\\,dx=\\tfrac1\\pi(2)\\). Answer: \\(2/\\pi\\)"], ["FIND C \u2014 MVT FOR INTEGRALS", "Find \\(c\\in[0,\\pi]\\) such that \\(f(c)=2/\\pi\\) for \\(f(x)=\\sin x\\).", "Solve \\(\\sin(c)=2/\\pi\\approx0.637\\). Answer: \\(c=\\arcsin(2/\\pi)\\approx0.69\\) rad (or its supplement, \\(\\approx2.45\\) rad)"], ["APPLIED \u2014 PHYSICAL CONTEXT", "A car's speed over a 2-hour trip is \\(v(t)=60+10t-5t^2\\) (km/h). Find the average speed.", "\\(\\tfrac12\\int_0^2(60+10t-5t^2)dt=\\tfrac12(126.67)\\). Answer: \\(\\approx63.33\\) km/h"], ["ERROR ANALYSIS", "A student computes the average value of \\(f(x)=1/x\\) on \\([1,e]\\) but forgets to divide by the interval length. Correct it.", "\\(\\int_1^e(1/x)dx=1\\), but the average needs dividing by \\((e-1)\\approx1.718\\). Correct average: \\(\\approx0.582\\), not \\(1\\)."], ["CONCEPTUAL", "Explain the geometric interpretation of 'average value' using a rectangle of the same base and area as the region under the curve.", "The average value multiplied by the interval length \\((b-a)\\) equals the area under the curve; a rectangle with base \\((b-a)\\) and height equal to the average value has exactly the same area as the region under \\(f\\) \u2014 the average is the 'constant height' reproducing the same total area."], ["APPLIED", "A river's pollutant concentration is \\(C(t)=20e^{-0.1t}\\) mg/L over 10 days. Find the average concentration.", "\\(\\tfrac1{10}\\int_0^{10}20e^{-0.1t}dt=\\tfrac1{10}(200)(1-e^{-1})\\). Answer: \\(20(1-e^{-1})\\approx12.64\\) mg/L"]], [["BASIC APPLICATION", "Find the average value of \\(f(x)=\\sqrt{x}\\) on \\([0,4]\\).", "\\(\\tfrac14\\int_0^4\\sqrt{x}\\,dx=\\tfrac14(16/3)\\). Answer: \\(4/3\\)"], ["FIND C \u2014 MVT FOR INTEGRALS", "Find \\(c\\in[0,4]\\) such that \\(f(c)=4/3\\) for \\(f(x)=\\sqrt{x}\\).", "Solve \\(\\sqrt{c}=4/3\\). Answer: \\(c=16/9\\)"], ["APPLIED \u2014 PHYSICAL CONTEXT", "A tidal pool's depth is \\(D(t)=3+2\\cos(\\pi t/6)\\) (m) over 12 hours. Find the average depth.", "The cosine term integrates to zero over its full 12-hour period. Answer: \\(3\\) m"], ["ERROR ANALYSIS", "A student computes the average value of \\(f(x)=x^3\\) on \\([-2,2]\\) and gets a nonzero answer. What should the correct value be, and why?", "Since \\(x^3\\) is odd and the interval is symmetric about \\(0\\), the positive and negative contributions cancel exactly. The correct average value is \\(0\\)."], ["CONCEPTUAL", "Explain why the average value of a function usually differs from the average of just its two endpoint values.", "The average value formula weights the function's behaviour across every point in the interval via integration; the two-endpoint average only samples the boundary, so unless \\(f\\) is linear (a straight-line graph), the two methods generally disagree."], ["APPLIED", "Daily electricity demand is \\(P(t)=1000+200\\sin(\\pi(t-6)/12)\\) MW for \\(0\\le t\\le24\\). Find the average demand.", "The sine term averages to zero over the full 24-hour period. Answer: \\(1000\\) MW"]], [["BASIC APPLICATION", "Find the average value of \\(f(x)=e^x\\) on \\([0,2]\\).", "\\(\\tfrac12\\int_0^2e^x\\,dx=\\tfrac12(e^2-1)\\). Answer: \\(\\approx3.19\\)"], ["FIND C \u2014 MVT FOR INTEGRALS", "Find \\(c\\in[0,2]\\) such that \\(f(c)\\) equals the average value found above for \\(f(x)=e^x\\).", "Solve \\(e^c\\approx3.19\\). Answer: \\(c=\\ln(3.19)\\approx1.16\\)"], ["APPLIED \u2014 PHYSICAL CONTEXT", "A reaction's rate is \\(r(t)=10e^{-0.2t}\\) mol/min over the first 5 minutes. Find the average rate.", "\\(\\tfrac15\\int_0^5 10e^{-0.2t}dt=\\tfrac15(50)(1-e^{-1})\\). Answer: \\(10(1-e^{-1})\\approx6.32\\) mol/min"], ["ERROR ANALYSIS", "A student computes the average value of \\(f(x)=x^2\\) on \\([0,2]\\) as \\(8/3\\), without dividing by the interval length. Correct it.", "The formula requires dividing by \\((b-a)=2\\): correct average \\(=\\tfrac12(8/3)\\). Answer: \\(4/3\\), not \\(8/3\\)"], ["CONCEPTUAL", "Explain why, for a periodic function averaged over exactly one full period, the oscillating part always contributes zero.", "Over a complete period, the areas above and below the function's midline cancel exactly by symmetry, so the oscillating component's net contribution to the integral \u2014 and hence to the average \u2014 is zero, leaving only the constant/baseline term."], ["APPLIED", "Monthly sales are \\(S(t)=5000+1000\\cos(\\pi t/6)\\) over a full year (\\(t=0\\) to \\(12\\)). Find the average monthly sales.", "The cosine term averages to zero over the full 12-month period. Answer: \\(5000\\) units"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
