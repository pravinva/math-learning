<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reverse Chain Rule (Linear Inner Functions)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Reverse Chain Rule (Linear Inner Functions)</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find \\(\\int(2x+3)^4\\,dx\\).", "Reverse chain rule. Answer: \\(\\dfrac{1}{10}(2x+3)^5+C\\)"], ["BASIC", "Find \\(\\int\\cos(5x)\\,dx\\).", "Reverse chain rule. Answer: \\(\\dfrac15\\sin(5x)+C\\)"], ["BASIC", "Find \\(\\int e^{4x}\\,dx\\).", "Reverse chain rule. Answer: \\(\\dfrac14e^{4x}+C\\)"], ["ERROR ANALYSIS", "A student integrates \\(\\int(3x-1)^5dx\\) and writes \\(\\tfrac16(3x-1)^6+C\\), forgetting to divide by the inner derivative. Correct it.", "Correct answer: \\(\\dfrac{1}{18}(3x-1)^6+C\\)"], ["CONCEPTUAL", "Explain the general pattern \\(\\int f(ax+b)\\,dx=\\tfrac1aF(ax+b)+C\\), where \\(F\\) is an antiderivative of \\(f\\).", "Since \\(d/dx[F(ax+b)]=aF'(ax+b)=af(ax+b)\\) by the chain rule, integrating \\(f(ax+b)\\) directly gives \\(F(ax+b)\\) times an extra factor of \\(a\\) that must be removed by dividing by \\(a\\) \u2014 this only works cleanly when the 'inside' is linear."], ["SUBSTITUTION SETUP", "Using \\(u=3x+1\\), set up (without fully solving) the substitution for \\(\\int(3x+1)^7\\,dx\\).", "\\(u=3x+1\\), \\(du=3\\,dx\\Rightarrow dx=du/3\\). Transformed integral: \\(\\tfrac13\\int u^7\\,du\\)"]], [["BASIC", "Find \\(\\int(5-2x)^3\\,dx\\) (careful with the negative inner derivative).", "Reverse chain rule. Answer: \\(-\\dfrac18(5-2x)^4+C\\)"], ["BASIC", "Find \\(\\int\\sin(3x)\\,dx\\).", "Reverse chain rule. Answer: \\(-\\dfrac13\\cos(3x)+C\\)"], ["BASIC", "Find \\(\\int e^{-2x}\\,dx\\).", "Reverse chain rule. Answer: \\(-\\dfrac12e^{-2x}+C\\)"], ["ERROR ANALYSIS", "A student integrates \\(\\int\\sec^2(4x)dx\\) and writes \\(\\tan(4x)+C\\), forgetting to divide by 4. Correct it.", "Correct answer: \\(\\dfrac14\\tan(4x)+C\\)"], ["CONCEPTUAL", "Explain why this shortcut (dividing by the constant multiplier) only works when the inside function is linear.", "When the inside is linear (\\(ax+b\\)), its derivative is the constant \\(a\\), so dividing by that single constant exactly undoes the chain-rule multiplication; if the inside were nonlinear (like \\(x^2\\)), its derivative would itself be a function of \\(x\\), and a simple division wouldn't correctly reverse the chain rule."], ["SUBSTITUTION SETUP", "Using \\(u=4-x\\), set up the substitution for \\(\\int(4-x)^6\\,dx\\).", "\\(u=4-x\\), \\(du=-dx\\Rightarrow dx=-du\\). Transformed integral: \\(-\\int u^6\\,du\\)"]], [["BASIC", "Find \\(\\int(x+7)^{-2}\\,dx\\).", "Reverse chain rule. Answer: \\(-(x+7)^{-1}+C\\)"], ["BASIC", "Find \\(\\int\\sqrt{2x+1}\\,dx\\).", "Reverse chain rule. Answer: \\(\\dfrac13(2x+1)^{3/2}+C\\)"], ["BASIC", "Find \\(\\int\\csc^2(6x)\\,dx\\).", "Reverse chain rule. Answer: \\(-\\dfrac16\\cot(6x)+C\\)"], ["ERROR ANALYSIS", "A student integrates \\(\\int\\dfrac{1}{2x+5}dx\\) and writes \\(\\ln|2x+5|+C\\), forgetting the division. Correct it.", "Correct answer: \\(\\tfrac12\\ln|2x+5|+C\\)"], ["CONCEPTUAL", "Explain how the 'linear inner function shortcut' is really just a simplified special case of full u-substitution.", "With \\(u=ax+b\\), \\(du=a\\,dx\\Rightarrow dx=du/a\\); substituting turns \\(\\int f(ax+b)dx\\) into \\(\\tfrac1a\\int f(u)\\,du\\) \u2014 exactly matching the shortcut formula, so the shortcut is u-substitution with the algebra already worked out in general."], ["SUBSTITUTION SETUP", "Using \\(u=1-5x\\), set up the substitution for \\(\\int\\sqrt{1-5x}\\,dx\\).", "\\(u=1-5x\\), \\(du=-5\\,dx\\Rightarrow dx=-du/5\\). Transformed integral: \\(-\\tfrac15\\int\\sqrt{u}\\,du\\)"]], [["BASIC", "Find \\(\\int(6x-1)^{-3}\\,dx\\).", "Reverse chain rule. Answer: \\(-\\dfrac{1}{12}(6x-1)^{-2}+C\\)"], ["BASIC", "Find \\(\\int\\tan(x)\\sec^2(x)\\,dx\\) (recognise \\(u=\\tan x\\), not a linear-inner case).", "Substitution with \\(u=\\tan x\\). Answer: \\(\\dfrac12\\tan^2(x)+C\\)"], ["BASIC", "Find \\(\\int e^{7x+2}\\,dx\\).", "Reverse chain rule. Answer: \\(\\dfrac17e^{7x+2}+C\\)"], ["ERROR ANALYSIS", "Faced with \\(\\int(x^2+1)^5\\cdot2x\\,dx\\), a student tries the 'divide by the linear coefficient' shortcut and gets confused since there's no constant to divide by. Explain the correct approach.", "The inside \\(x^2+1\\) is nonlinear, so its derivative (\\(2x\\)) is a function of \\(x\\), not a constant; however, since that exact derivative factor already appears in the integrand, substituting \\(u=x^2+1\\) (so \\(du=2x\\,dx\\)) converts the integral cleanly into \\(\\int u^5\\,du\\) \u2014 a genuine substitution, not just a constant-division shortcut."], ["CONCEPTUAL", "Explain the general test for recognising whether an integral needs the linear-inner shortcut or a full u-substitution.", "If the 'inside' of the composite function is linear (\\(ax+b\\)), the shortcut (divide by \\(a\\)) works directly; if the inside is nonlinear, check whether its derivative (up to a constant) appears elsewhere in the integrand \u2014 if so, a full substitution \\(u=\\text{inside}\\) will work."], ["SUBSTITUTION SETUP", "Using \\(u=x^3+2\\), set up the substitution for \\(\\int x^2(x^3+2)^4\\,dx\\).", "\\(u=x^3+2\\), \\(du=3x^2dx\\Rightarrow x^2dx=du/3\\). Transformed integral: \\(\\tfrac13\\int u^4\\,du\\)"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
