<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quotient Rule</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Quotient Rule</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC APPLICATION", "Differentiate \\(f(x)=\\dfrac{x^2+1}{x-3}\\).", "Quotient rule. Answer: \\(\\dfrac{x^2-6x-1}{(x-3)^2}\\)"], ["SIMPLIFY FIRST", "Differentiate \\(f(x)=\\dfrac{x^3+x}{x}\\) by simplifying first, then verify with the quotient rule.", "Simplify to \\(x^2+1\\), derivative \\(2x\\). Quotient rule gives \\(\\dfrac{(3x^2+1)x-(x^3+x)}{x^2}=2x\\) \u2014 matches."], ["ERROR ANALYSIS", "A student writes the quotient rule as \\((f/g)'=(f'g+fg')/g^2\\) (wrong sign). State the correct rule.", "The numerator should have a minus: \\((f/g)'=(f'g-fg')/g^2\\)."], ["TANGENT LINE", "Find the tangent line to \\(f(x)=x/(x+1)\\) at \\(x=1\\).", "\\(f(1)=1/2\\), \\(f'(x)=1/(x+1)^2\\), \\(f'(1)=1/4\\). Answer: \\(y=\\tfrac14(x-1)+\\tfrac12\\)"], ["CONCEPTUAL", "Explain why differentiating \\(1/g(x)\\) via the quotient rule agrees with using the chain rule on \\(g(x)^{-1}\\).", "Quotient rule (with \\(f=1\\)): \\((1/g)'=-g'/g^2\\). Chain rule: \\(d/dx[g^{-1}]=-g^{-2}g'=-g'/g^2\\). Same result \u2014 the quotient rule for a constant numerator is a special case of the chain rule."], ["APPLIED", "Average cost per unit is \\(A(x)=C(x)/x\\) with \\(C(x)=500+2x\\). Find \\(A'(x)\\) and interpret its sign.", "\\(A(x)=500/x+2\\), so \\(A'(x)=-500/x^2\\) (always negative) \u2014 average cost per unit decreases as production spreads fixed costs over more units."]], [["BASIC APPLICATION", "Differentiate \\(f(x)=\\dfrac{2x-1}{x^2+3}\\).", "Quotient rule. Answer: \\(\\dfrac{-2x^2+2x+6}{(x^2+3)^2}\\)"], ["SIMPLIFY FIRST", "Differentiate \\(f(x)=\\dfrac{x^2-4}{x-2}\\) by simplifying first (\\(x\\ne2\\)). What happens at \\(x=2\\)?", "Simplifies to \\(x+2\\), derivative \\(1\\), for \\(x\\ne2\\). At \\(x=2\\) the original function isn't even defined (removable discontinuity), so differentiability there is moot."], ["ERROR ANALYSIS", "A student uses the quotient rule but forgets to square the denominator: \\((f/g)'=(f'g-fg')/g\\). Correct the formula.", "The denominator must be \\(g^2\\), not \\(g\\)."], ["TANGENT LINE", "Find the tangent line to \\(f(x)=(x-1)/(x+1)\\) at \\(x=0\\).", "\\(f(0)=-1\\), \\(f'(x)=2/(x+1)^2\\), \\(f'(0)=2\\). Answer: \\(y=2x-1\\)"], ["CONCEPTUAL", "Derive \\(f'(x)\\) for \\(f(x)=\\tan x=\\sin x/\\cos x\\) using the quotient rule, and simplify to \\(\\sec^2x\\).", "\\(f'=\\dfrac{\\cos x\\cos x-\\sin x(-\\sin x)}{\\cos^2x}=\\dfrac{\\cos^2x+\\sin^2x}{\\cos^2x}=\\dfrac{1}{\\cos^2x}=\\sec^2x\\)."], ["APPLIED", "Drug concentration is \\(C(t)=50t/(t^2+25)\\). Find \\(C'(t)\\) and the time when concentration is momentarily not changing.", "\\(C'(t)=\\dfrac{50(25-t^2)}{(t^2+25)^2}\\). This is zero when \\(t^2=25\\), i.e.\\ \\(t=5\\) (taking positive time)."]], [["BASIC APPLICATION", "Differentiate \\(f(x)=\\dfrac{x^3-2}{x^2+1}\\).", "Quotient rule, then simplify. Answer: \\(\\dfrac{x^4+3x^2+4x}{(x^2+1)^2}\\)"], ["SIMPLIFY FIRST", "Differentiate \\(f(x)=\\dfrac{x^2+2x}{x}\\) (\\(x\\ne0\\)) by simplifying first, then verify with the quotient rule.", "Simplifies to \\(x+2\\), derivative \\(1\\). Quotient rule gives \\(\\dfrac{(2x+2)x-(x^2+2x)}{x^2}=1\\) \u2014 matches."], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=\\cos(x)/x\\) as \\(f'(x)=-\\sin(x)\\), treating \\(x\\) in the denominator as a constant throughout. Give the correct derivative.", "Correct via the quotient rule: \\(f'(x)=\\dfrac{-x\\sin x-\\cos x}{x^2}\\)."], ["TANGENT LINE", "Find the tangent line to \\(f(x)=1/(x^2+1)\\) at \\(x=1\\).", "\\(f(1)=1/2\\), \\(f'(x)=-2x/(x^2+1)^2\\), \\(f'(1)=-1/2\\). Answer: \\(y=-\\tfrac{x}{2}+1\\)"], ["CONCEPTUAL", "Show that writing \\(f\\cdot h\\) as \\(f/(1/h)\\) and applying the quotient rule reduces back to the product rule.", "Applying the quotient rule to \\(f/(1/h)\\) and simplifying the algebra recovers \\(f'h+fh'\\), confirming the two rules are consistent."], ["APPLIED", "Machine efficiency is \\(E(t)=100t/(t+10)\\%\\). Find \\(E'(t)\\) and evaluate at \\(t=10\\).", "\\(E'(t)=1000/(t+10)^2\\). At \\(t=10\\): \\(1000/400=2.5\\%\\)/min."]], [["BASIC APPLICATION", "Differentiate \\(f(x)=\\dfrac{5-x}{x^2-4}\\).", "Quotient rule, then simplify. Answer: \\(\\dfrac{x^2-10x+4}{(x^2-4)^2}\\)"], ["SIMPLIFY FIRST", "Differentiate \\(f(x)=\\dfrac{x^3+x^2}{x^2}\\) (\\(x\\ne0\\)) by simplifying first, then verify with the quotient rule.", "Simplifies to \\(x+1\\), derivative \\(1\\). Quotient rule confirms the same result after simplification."], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=e^x/x^2\\) and writes \\(f'(x)=e^x/(2x)\\) by mistakenly cancelling. Give the correct derivative.", "Correct via the quotient rule: \\(f'(x)=\\dfrac{e^x(x-2)}{x^3}\\)."], ["TANGENT LINE", "Find the tangent line to \\(f(x)=\\ln(x)/x\\) at \\(x=1\\).", "\\(f(1)=0\\), \\(f'(x)=(1-\\ln x)/x^2\\), \\(f'(1)=1\\). Answer: \\(y=x-1\\)"], ["CONCEPTUAL", "Why is it often better to simplify a rational function algebraically before differentiating, rather than always applying the quotient rule directly?", "Cancelling common factors first can turn a messy quotient into a simple polynomial, reducing the chance of algebraic error \u2014 though care is needed since simplification can remove or introduce removable discontinuities that affect the domain."], ["APPLIED", "Fuel efficiency is \\(F(v)=v^2/(v+50)\\) km/L, \\(v\\) in km/h. Find \\(F'(v)\\) and evaluate at \\(v=50\\).", "\\(F'(v)=\\dfrac{v^2+100v}{(v+50)^2}\\). At \\(v=50\\): \\((2500+5000)/10000=0.75\\)."]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
