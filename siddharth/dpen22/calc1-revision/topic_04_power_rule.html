<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Power Rule</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Power Rule</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["REWRITE FIRST", "Differentiate \\(f(x)=1/x^3\\) by first rewriting it as a power of \\(x\\).", "Rewrite as \\(x^{-3}\\), apply the power rule. Answer: \\(-3x^{-4}=-3/x^4\\)"], ["REWRITE FIRST", "Differentiate \\(f(x)=\\sqrt[3]{x^2}\\) by first rewriting it as a power of \\(x\\).", "Rewrite as \\(x^{2/3}\\). Answer: \\(\\tfrac23x^{-1/3}\\)"], ["MULTI-TERM", "Differentiate \\(f(x)=4x^5-3x^{-2}+7\\).", "Differentiate term by term. Answer: \\(20x^4+6x^{-3}\\)"], ["TANGENT LINE", "Find the equation of the tangent line to \\(f(x)=x^4\\) at \\(x=1\\).", "\\(f(1)=1\\), \\(f'(1)=4\\). Answer: \\(y=4x-3\\)"], ["CONCEPTUAL", "Explain why the power rule \\(d/dx\\,x^n=nx^{n-1}\\) still works when \\(n\\) is negative or fractional, using \\(n=-1/2\\) as an example.", "The rule holds for any real exponent (justified more generally via logarithmic differentiation), not just positive integers. For \\(f(x)=x^{-1/2}\\), \\(f'(x)=-\\tfrac12x^{-3/2}\\), which matches the same pattern."], ["HIGHER ORDER", "Find the second derivative of \\(f(x)=x^6\\).", "Differentiate twice. Answer: \\(f''(x)=30x^4\\)"]], [["REWRITE FIRST", "Differentiate \\(f(x)=5/\\sqrt{x}\\) by first rewriting as a power of \\(x\\).", "Rewrite as \\(5x^{-1/2}\\). Answer: \\(-\\tfrac52x^{-3/2}\\)"], ["REWRITE FIRST", "Differentiate \\(f(x)=x\\sqrt{x}\\) by first rewriting as a power of \\(x\\).", "Rewrite as \\(x^{3/2}\\). Answer: \\(\\tfrac32x^{1/2}\\)"], ["MULTI-TERM", "Differentiate \\(f(x)=2x^{3/2}-x^{-1}+5x\\).", "Differentiate term by term. Answer: \\(3x^{1/2}+x^{-2}+5\\)"], ["TANGENT LINE", "Find where the tangent line to \\(f(x)=x^3\\) is horizontal.", "Solve \\(f'(x)=3x^2=0\\). Answer: \\(x=0\\) (point \\((0,0)\\))"], ["CONCEPTUAL", "A student claims \\(d/dx(x^0)=0\\cdot x^{-1}=0\\). Is this reasoning sound?", "\\(x^0=1\\) is a constant for \\(x\\ne0\\), so its derivative genuinely is \\(0\\) \u2014 but the correct justification is 'derivative of a constant is 0', not the informal exponent-drop reasoning shown, which is imprecise at \\(n=0\\)."], ["HIGHER ORDER", "Find \\(f''(x)\\) for \\(f(x)=x^{-1}\\).", "Differentiate twice. Answer: \\(f''(x)=2x^{-3}\\)"]], [["REWRITE FIRST", "Differentiate \\(f(x)=\\dfrac{1}{x^2\\sqrt{x}}\\) by simplifying the exponent first.", "Rewrite as \\(x^{-5/2}\\). Answer: \\(-\\tfrac52x^{-7/2}\\)"], ["REWRITE FIRST", "Differentiate \\(f(x)=\\sqrt[4]{x^3}\\).", "Rewrite as \\(x^{3/4}\\). Answer: \\(\\tfrac34x^{-1/4}\\)"], ["MULTI-TERM", "Differentiate \\(f(x)=x^{10}-6x^4+2\\sqrt{x}\\).", "Differentiate term by term. Answer: \\(10x^9-24x^3+1/\\sqrt{x}\\)"], ["TANGENT LINE", "Find the equation of the tangent line to \\(f(x)=1/x\\) at \\(x=2\\).", "\\(f(2)=1/2\\), \\(f'(x)=-1/x^2\\), \\(f'(2)=-1/4\\). Answer: \\(y=-\\tfrac14(x-2)+\\tfrac12\\)"], ["CONCEPTUAL", "Explain the error in trying to differentiate a sum of powers by 'adding the exponents' rather than differentiating each term separately.", "The power rule applies to each term individually because differentiation is linear (the derivative of a sum is the sum of derivatives); combining exponents across separate additive terms as if multiplying them is a fundamentally different (and invalid) operation here."], ["HIGHER ORDER", "Find the third derivative of \\(f(x)=x^5\\).", "Differentiate three times. Answer: \\(f'''(x)=60x^2\\)"]], [["REWRITE FIRST", "Differentiate \\(f(x)=x^2\\cdot x^{-5}\\) by simplifying the power first.", "Combine exponents: \\(x^{-3}\\). Answer: \\(-3x^{-4}\\)"], ["REWRITE FIRST", "Differentiate \\(f(x)=1/\\sqrt[3]{x}\\).", "Rewrite as \\(x^{-1/3}\\). Answer: \\(-\\tfrac13x^{-4/3}\\)"], ["MULTI-TERM", "Differentiate \\(f(x)=3x^{-3}+2x^{1/2}-x\\).", "Differentiate term by term. Answer: \\(-9x^{-4}+x^{-1/2}-1\\)"], ["TANGENT LINE", "At what \\(x\\)-value(s) does \\(f(x)=x^3-3x\\) have a horizontal tangent line?", "Solve \\(f'(x)=3x^2-3=0\\). Answer: \\(x=\\pm1\\)"], ["CONCEPTUAL", "Why does the power rule not directly apply to a function like \\(2^x\\)?", "The power rule is for a variable \\emph{base} raised to a constant power. In \\(2^x\\) the exponent contains the variable and the base is fixed, so it requires exponential differentiation rules instead."], ["HIGHER ORDER", "For \\(f(x)=x^4-2x^2\\), find \\(f''(x)\\) and its value at \\(x=0\\).", "\\(f'=4x^3-4x\\), \\(f''=12x^2-4\\). Answer: \\(f''(0)=-4\\)"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
