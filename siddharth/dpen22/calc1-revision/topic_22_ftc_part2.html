<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTC Part 2 — Evaluating Definite Integrals</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>FTC Part 2 — Evaluating Definite Integrals</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Evaluate \\(\\int_0^2(3x^2)\\,dx\\).", "Antiderivative \\(x^3\\); evaluate at bounds. Answer: \\(8\\)"], ["BASIC", "Evaluate \\(\\int_1^4\\sqrt{x}\\,dx\\).", "Antiderivative \\(\\tfrac23x^{3/2}\\); evaluate at bounds. Answer: \\(14/3\\)"], ["TRIG", "Evaluate \\(\\int_0^{\\pi/2}\\cos(x)\\,dx\\).", "Antiderivative \\(\\sin x\\); evaluate at bounds. Answer: \\(1\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_1^3\\dfrac1x\\,dx\\) using the power rule and gets an undefined result, then gives up. Explain the correct method.", "The power rule doesn't apply at \\(n=-1\\); use the log rule instead: \\(\\int_1^3\\tfrac1xdx=[\\ln x]_1^3\\). Answer: \\(\\ln3\\)"], ["CONCEPTUAL", "Explain the general procedure for evaluating a definite integral using FTC Part 2.", "Find any antiderivative \\(F(x)\\) of the integrand; evaluate \\(F(b)-F(a)\\), where \\(a,b\\) are the limits of integration \u2014 the choice of antiderivative (which constant \\(C\\)) doesn't matter, since it cancels in the subtraction."], ["APPLIED", "Marginal cost is \\(C'(x)=20-0.01x\\). Find the additional cost of producing units 100 through 200.", "\\(\\int_{100}^{200}(20-0.01x)dx=[20x-0.005x^2]_{100}^{200}\\). Answer: \\(1850\\)"]], [["BASIC", "Evaluate \\(\\int_{-2}^{1}(x^2+2x)\\,dx\\).", "Antiderivative \\(x^3/3+x^2\\); evaluate at bounds. Answer: \\(0\\)"], ["BASIC", "Evaluate \\(\\int_4^9\\dfrac{1}{\\sqrt{x}}\\,dx\\).", "Antiderivative \\(2\\sqrt{x}\\); evaluate at bounds. Answer: \\(2\\)"], ["TRIG", "Evaluate \\(\\int_0^{\\pi}\\sin(x)\\,dx\\).", "Antiderivative \\(-\\cos x\\); evaluate at bounds. Answer: \\(2\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_2^5(3x^2-1)dx\\) by computing \\(F(2)-F(5)\\) instead of \\(F(5)-F(2)\\). What's the effect?", "This produces the exact negative of the correct answer; the convention is always upper minus lower, \\(F(b)-F(a)\\), and reversing the order flips the sign of the result."], ["CONCEPTUAL", "Explain why it doesn't matter which specific antiderivative \\(F(x)\\) you choose when applying FTC Part 2.", "Any two antiderivatives of the same function differ only by a constant \\(C\\); when computing \\(F(b)-F(a)\\), that constant appears in both terms and cancels exactly, so the final answer is identical regardless of which antiderivative was used."], ["APPLIED", "Water flows out of a tank at rate \\(r(t)=50-5t\\) L/min. Find the total volume that flowed out from \\(t=0\\) to \\(t=6\\).", "\\(\\int_0^6(50-5t)dt=[50t-2.5t^2]_0^6\\). Answer: \\(210\\)L"]], [["BASIC", "Evaluate \\(\\int_0^3(x^3-x)\\,dx\\).", "Antiderivative \\(x^4/4-x^2/2\\); evaluate at bounds. Answer: \\(15.75\\)"], ["BASIC", "Evaluate \\(\\int_1^8x^{1/3}\\,dx\\).", "Antiderivative \\(\\tfrac34x^{4/3}\\); evaluate at bounds. Answer: \\(11.25\\)"], ["TRIG", "Evaluate \\(\\int_{\\pi/6}^{\\pi/3}\\sec^2(x)\\,dx\\).", "Antiderivative \\(\\tan x\\); evaluate at bounds. Answer: \\(\\dfrac{2\\sqrt3}{3}\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_{-3}^3x^3dx\\) correctly through the mechanics but makes an arithmetic slip and reports a nonzero answer. What conceptual check catches this?", "\\(x^3\\) is odd and the interval is symmetric about \\(0\\), so the positive and negative contributions must cancel exactly, giving zero \u2014 checking this symmetry beforehand is a quick sanity check on the final answer."], ["CONCEPTUAL", "Explain why FTC Part 2 converts a limit-of-Riemann-sums problem into simple arithmetic.", "The Riemann sum definition requires an elaborate limiting process over increasingly fine partitions; FTC shows this limit always equals \\(F(b)-F(a)\\) for any antiderivative \\(F\\), replacing that limiting process with straightforward evaluation."], ["APPLIED", "A pump delivers fluid at rate \\(p(t)=10e^{0.1t}\\) L/min. Find the total volume delivered over the first 10 minutes.", "\\(\\int_0^{10}10e^{0.1t}dt=[100e^{0.1t}]_0^{10}=100e-100\\). Answer: \\(\\approx171.8\\)L"]], [["BASIC", "Evaluate \\(\\int_1^2(4x^3-3x^2)\\,dx\\).", "Antiderivative \\(x^4-x^3\\); evaluate at bounds. Answer: \\(8\\)"], ["BASIC", "Evaluate \\(\\int_0^1(1-x)^4\\,dx\\) (reverse chain rule needed).", "Antiderivative \\(-\\tfrac15(1-x)^5\\); evaluate at bounds. Answer: \\(1/5\\)"], ["TRIG", "Evaluate \\(\\int_0^{\\pi/4}\\sec(x)\\tan(x)\\,dx\\).", "Antiderivative \\(\\sec x\\); evaluate at bounds. Answer: \\(\\sqrt2-1\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_0^1(1-x)^4dx\\) by expanding the binomial into five terms first, taking much longer than necessary. What quicker technique should be used?", "The reverse chain rule (recognising the linear inner function \\(1-x\\)) integrates \\((1-x)^4\\) directly as \\(-\\tfrac15(1-x)^5+C\\) without expanding; both methods must agree, but the reverse chain rule is far more efficient."], ["CONCEPTUAL", "Summarise how FTC Parts 1 and 2 work together as a complete framework connecting derivatives and integrals.", "Part 1 shows differentiating an accumulation function recovers the integrand, establishing integration and differentiation as inverses; Part 2 leverages this to show any definite integral can be evaluated using an antiderivative rather than a limit of sums \u2014 together forming the backbone connecting the two branches of calculus."], ["APPLIED", "A city's population growth rate is \\(g(t)=200+30t\\) people/year. Find the total population increase from \\(t=0\\) to \\(t=15\\).", "\\(\\int_0^{15}(200+30t)dt=[200t+15t^2]_0^{15}\\). Answer: \\(6375\\) people"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
