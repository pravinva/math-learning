<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Area Under &amp; Between Curves</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Area Under &amp; Between Curves</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["SINGLE CURVE AREA", "Find the area under \\(y=x^2\\) from \\(x=1\\) to \\(x=3\\).", "\\(\\int_1^3x^2dx=[x^3/3]_1^3=9-1/3\\). Answer: \\(26/3\\)"], ["AREA WITH NEGATIVE REGION", "Find the total area between \\(y=x^3-x\\) and the x-axis on \\([-1,1]\\) (the curve crosses zero at \\(x=0\\)).", "By symmetry, each half contributes equally. Answer: \\(1/2\\)"], ["AREA BETWEEN CURVES", "Find the area between \\(y=x^2\\) and \\(y=2x\\) from \\(x=0\\) to \\(x=2\\) (determine which curve is on top first).", "\\(2x\\) is above \\(x^2\\) on \\((0,2)\\). Area \\(=\\int_0^2(2x-x^2)dx=[x^2-x^3/3]_0^2\\). Answer: \\(4/3\\)"], ["ERROR ANALYSIS", "A student computes the area between \\(y=x\\) and \\(y=x^2\\) on \\([0,1]\\) as \\(\\int_0^1(x^2-x)dx\\) and gets a negative number, but reports it as the area anyway. What's wrong?", "Since \\(x^2<x\\) on \\((0,1)\\), the subtraction order was reversed; the correct setup is \\(\\int_0^1(x-x^2)dx\\), or simply take the absolute value of the negative result."], ["CONCEPTUAL", "Explain why finding the area between two curves requires first identifying which function is greater on the interval.", "Integrating (bottom \u2212 top) gives the negative of the true area; identifying which curve is on top ensures the integrand (top \u2212 bottom) stays non-negative, so the integral directly gives a positive area matching the geometric definition."], ["APPLIED", "A factory's production rate is \\(p(t)=100-2t\\) (t in days). Find the area under this curve from \\(t=0\\) to \\(t=20\\) and interpret it.", "\\(\\int_0^{20}(100-2t)dt=[100t-t^2]_0^{20}=2000-400\\). Answer: \\(1600\\) \u2014 total units produced over the 20 days"]], [["SINGLE CURVE AREA", "Find the area under \\(y=\\sqrt{x}\\) from \\(x=0\\) to \\(x=9\\).", "\\(\\int_0^9\\sqrt{x}\\,dx=[\\tfrac23x^{3/2}]_0^9\\). Answer: \\(18\\)"], ["AREA WITH NEGATIVE REGION", "Find the total area between \\(y=\\sin(x)\\) and the x-axis from \\(x=0\\) to \\(x=2\\pi\\).", "Positive on \\((0,\\pi)\\), negative on \\((\\pi,2\\pi)\\), each contributing area \\(2\\). Answer: \\(4\\)"], ["AREA BETWEEN CURVES", "Find the area between \\(y=8-x^2\\) and \\(y=x^2\\) (find intersection points first).", "Intersect at \\(x=\\pm2\\). Area \\(=\\int_{-2}^2(8-2x^2)dx=[8x-\\tfrac23x^3]_{-2}^2\\). Answer: \\(64/3\\)"], ["ERROR ANALYSIS", "A student sets up the area between \\(y=x^2-1\\) and \\(y=1-x^2\\) as \\(\\int[(x^2-1)-(1-x^2)]dx\\) without checking which curve is on top. What could go wrong?", "If \\(1-x^2\\) is actually the larger function over the interval in question, the subtraction order is backwards and the result comes out negative; always verify which curve dominates before setting up the integral (or take the absolute value)."], ["CONCEPTUAL", "Explain why, when curves cross more than twice within an interval, the 'area between them' requires splitting the integral at each crossing.", "Between consecutive intersection points, one curve consistently stays on top; if the curves swap dominance at a crossing and you integrate straight through without splitting, a negative region could cancel part of a positive region, understating the true total area."], ["APPLIED", "A chemical reaction proceeds at rate \\(r(t)=5e^{-0.1t}\\) mol/s. Find the total product formed from \\(t=0\\) to \\(t=10\\).", "\\(\\int_0^{10}5e^{-0.1t}dt=[-50e^{-0.1t}]_0^{10}=50(1-e^{-1})\\). Answer: \\(\\approx31.6\\) mol"]], [["SINGLE CURVE AREA", "Find the area under \\(y=1/x\\) from \\(x=1\\) to \\(x=4\\).", "\\(\\int_1^4(1/x)dx=[\\ln x]_1^4\\). Answer: \\(\\ln4\\)"], ["AREA WITH NEGATIVE REGION", "Find the total area between \\(y=x^2-4\\) and the x-axis from \\(x=-3\\) to \\(x=3\\).", "The curve dips below the axis between \\(x=\\pm2\\); split into three pieces and add absolute areas. Answer: \\(46/3\\)"], ["AREA BETWEEN CURVES", "Find the area enclosed between \\(y=x^3\\) and \\(y=x\\) (find all intersection points, using symmetry).", "Intersect at \\(x=0,\\pm1\\); by symmetry, Area \\(=2\\int_0^1(x-x^3)dx\\). Answer: \\(1/2\\)"], ["ERROR ANALYSIS", "A student finds the area between \\(y=x^3\\) and \\(y=x\\) by integrating \\((x^3-x)\\) over \\([-1,1]\\) directly, getting \\(0\\). Explain the mistake.", "\\((x^3-x)\\) is odd, so its integral over the symmetric interval \\([-1,1]\\) is always \\(0\\) regardless of the actual enclosed area \u2014 the positive and negative regions cancel. The correct approach splits at \\(x=0\\) (where the curves cross) and sums the absolute areas of each piece."], ["CONCEPTUAL", "Explain the difference between 'net signed area' from a single integral and 'total enclosed area' between crossing curves.", "Net signed area lets regions where one curve is below the other count as negative, so crossings cause cancellation; total enclosed area requires identifying every crossing, integrating the correctly-ordered difference on each sub-interval, and summing the resulting positive areas."], ["APPLIED", "Two companies' revenue rates are \\(r_1(t)=100+5t\\) and \\(r_2(t)=150-2t\\) (thousands/month). Set up the area between these curves from \\(t=0\\) to \\(t=10\\), and interpret its meaning.", "They cross where \\(100+5t=150-2t\\Rightarrow t=50/7\\). Area \\(=\\int_0^{50/7}(r_2-r_1)dt+\\int_{50/7}^{10}(r_1-r_2)dt\\) \u2014 this total represents the cumulative difference in revenue between the two companies over the 10-month period."]], [["SINGLE CURVE AREA", "Find the area under \\(y=e^{-x}\\) from \\(x=0\\) to \\(x=2\\).", "\\(\\int_0^2e^{-x}dx=[-e^{-x}]_0^2\\). Answer: \\(1-e^{-2}\\)"], ["AREA WITH NEGATIVE REGION", "Find the total area between \\(y=\\cos(x)\\) and the x-axis from \\(x=0\\) to \\(x=3\\pi/2\\).", "Positive on \\((0,\\pi/2)\\), negative on \\((\\pi/2,3\\pi/2)\\). Answer: \\(1+2=3\\)"], ["AREA BETWEEN CURVES", "Find the area between \\(y=e^x\\) and \\(y=e^{-x}\\) from \\(x=0\\) to \\(x=1\\) (determine which is on top first).", "For \\(x>0\\), \\(e^x>e^{-x}\\). Area \\(=\\int_0^1(e^x-e^{-x})dx=[e^x+e^{-x}]_0^1\\). Answer: \\(e+1/e-2\\)"], ["ERROR ANALYSIS", "A student sets up the area between \\(y=4-x\\) and \\(y=x^2-2x\\) using arbitrary bounds instead of finding the intersection points. Why is this a problem?", "The bounds of integration for 'area between curves' must be the actual x-values where the curves meet (where the enclosed region begins and ends); arbitrary bounds integrate over a region that doesn't correspond to the true enclosed area, giving a meaningless result."], ["CONCEPTUAL", "Explain why using 'top curve minus bottom curve' always gives a positive result, provided the top/bottom identification is correct.", "By definition the top curve has greater y-values throughout the interval, so 'top minus bottom' is non-negative everywhere there; integrating a non-negative quantity always gives a non-negative result, correctly matching the geometric area."], ["APPLIED", "Two hikers' elevation gain rates are \\(g_1(t)=2t\\) and \\(g_2(t)=t^2/2\\) (m/hr). Find the area between these curves from \\(t=0\\) to \\(t=4\\), and interpret it.", "They intersect at \\(t=0,4\\), with \\(g_1\\ge g_2\\) throughout. Area \\(=\\int_0^4(2t-t^2/2)dt=[t^2-t^3/6]_0^4\\). Answer: \\(16/3\\) \u2014 the cumulative elevation-gain difference between the hikers over 4 hours"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
