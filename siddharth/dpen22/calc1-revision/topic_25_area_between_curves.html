<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Area Between Two Curves</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Area Between Two Curves</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find the area between \\(y=x^2\\) and \\(y=4\\) (find intersection points first).", "Intersect at \\(x=\\pm2\\). Area \\(=\\int_{-2}^2(4-x^2)dx=[4x-x^3/3]_{-2}^2\\). Answer: \\(32/3\\)"], ["WITH RESPECT TO Y", "Find the area between \\(x=y^2\\) and \\(x=4\\) by integrating with respect to \\(y\\) instead.", "Intersect at \\(y=\\pm2\\). Area \\(=\\int_{-2}^2(4-y^2)dy\\). Answer: \\(32/3\\) (same region, computed the other way)"], ["MULTIPLE INTERSECTIONS", "Find the area enclosed between \\(y=x^3\\) and \\(y=4x\\) (find all intersection points first).", "\\(x^3=4x\\Rightarrow x=0,\\pm2\\). By symmetry, total area \\(=2\\int_0^2(4x-x^3)dx=2[2x^2-x^4/4]_0^2=2(8-4)\\). Answer: \\(8\\)"], ["ERROR ANALYSIS", "A student, finding the area between \\(y=x^2-2\\) and \\(y=2-x^2\\), sets up the integral over an arbitrary interval instead of the actual intersection points. Identify the correct bounds.", "\\(x^2-2=2-x^2\\Rightarrow x=\\pm\\sqrt2\\); these are the correct bounds, since the enclosed region only exists between the actual crossing points."], ["CONCEPTUAL", "Explain when it's more convenient to set up an area-between-curves integral with respect to \\(y\\) rather than \\(x\\).", "When curves are more naturally expressed as \\(x=g(y)\\) (e.g. sideways parabolas), or when the region overlaps in \\(x\\)-value at some heights (making a single top/bottom description awkward), integrating with respect to \\(y\\) using left/right boundaries is often simpler."], ["APPLIED", "Two production lines have output rates \\(A(t)=200+10t\\) and \\(B(t)=250-5t\\) over \\([0,20]\\) days. Set up the area between these curves after finding where they cross.", "They cross where \\(200+10t=250-5t\\Rightarrow t=10/3\\). Set up and sum the two piecewise integrals (before/after \\(t=10/3\\)) for the total cumulative output difference."]], [["BASIC", "Find the area between \\(y=\\sqrt{x}\\) and \\(y=x/2\\) (find intersection points first).", "Intersect at \\(x=0,4\\). Area \\(=\\int_0^4(\\sqrt{x}-x/2)dx=[\\tfrac23x^{3/2}-x^2/4]_0^4\\). Answer: \\(4/3\\)"], ["WITH RESPECT TO Y", "Find the area between \\(x=y\\) and \\(x=y^2\\) by integrating with respect to \\(y\\) (intersect at \\(y=0,1\\)).", "Area \\(=\\int_0^1(y-y^2)dy\\). Answer: \\(1/6\\)"], ["MULTIPLE INTERSECTIONS", "Find the area enclosed between \\(y=\\sin(x)\\) and \\(y=\\cos(x)\\) on \\([0,\\pi/2]\\) (find the intersection point first).", "Intersect at \\(x=\\pi/4\\); \\(\\cos x>\\sin x\\) before, \\(\\sin x>\\cos x\\) after. Area \\(=\\int_0^{\\pi/4}(\\cos x-\\sin x)dx+\\int_{\\pi/4}^{\\pi/2}(\\sin x-\\cos x)dx=2(\\sqrt2-1)\\)"], ["ERROR ANALYSIS", "A student finds the area between \\(y=e^x\\) and \\(y=x+1\\) (its tangent line at \\(x=0\\)) by integrating over an arbitrarily chosen interval, assuming that's automatically 'the enclosed area'. Explain the subtlety.", "Since \\(y=x+1\\) is tangent to \\(y=e^x\\) at \\(x=0\\), the curves touch but don't cross there \u2014 they meet at only a single point in that neighbourhood, so there isn't a genuinely 'enclosed' finite region in the usual two-intersection sense without further context."], ["CONCEPTUAL", "Explain why finding all intersection points matters when curves might cross more than twice, using a cubic vs. line example.", "If a cubic and a line intersect at three points, the curves alternate which is 'on top' between consecutive intersections; missing an intersection point would use the wrong top/bottom ordering on some sub-interval, corrupting the area calculation there."], ["APPLIED", "Two runners have speed profiles \\(v_1(t)=10-t\\) and \\(v_2(t)=2+t\\) over \\([0,8]\\)s. Set up the area between these curves after finding where they cross.", "They cross at \\(t=4\\). Set up \\(\\int_0^4(v_1-v_2)dt+\\int_4^8(v_2-v_1)dt\\) and sum for the total cumulative speed difference."]], [["BASIC", "Find the area between \\(y=x^2-4x\\) and the x-axis using an area-between-curves setup (treat \\(y=0\\) as one 'curve').", "Roots at \\(x=0,4\\); the parabola dips below, so \\(y=0\\) is on top. Area \\(=\\int_0^4[0-(x^2-4x)]dx=\\int_0^4(4x-x^2)dx=32-64/3\\). Answer: \\(32/3\\)"], ["WITH RESPECT TO Y", "Find the area enclosed between \\(x=4-y^2\\) and \\(x=0\\) by integrating with respect to \\(y\\).", "Intersect at \\(y=\\pm2\\). Area \\(=\\int_{-2}^2(4-y^2)dy\\). Answer: \\(32/3\\)"], ["MULTIPLE INTERSECTIONS", "Find the area enclosed between \\(y=x^3-3x\\) and \\(y=x\\) (find all intersection points first).", "\\(x^3-4x=0\\Rightarrow x=0,\\pm2\\). By symmetry, total area \\(=2\\int_0^2(4x-x^3)dx=2(8-4)\\). Answer: \\(8\\)"], ["ERROR ANALYSIS", "A student sets up \\(\\int(x^2-(-x^2))dx\\) for the area between \\(y=x^2\\) and \\(y=-x^2\\) over an arbitrary interval, not realising these curves only meet at \\(x=0\\). Explain the issue.", "Since the two parabolas only ever meet at \\(x=0\\) and otherwise diverge, there's no naturally bounded, finite enclosed region unless specific bounds are given explicitly; without stated bounds, 'the area between the curves' isn't well-defined here."], ["CONCEPTUAL", "Explain how symmetry can simplify area-between-curves calculations, using an example.", "If the enclosed region is symmetric about the y-axis or origin, you can compute the area of just one symmetric half and double it, rather than integrating across the entire region directly \u2014 often simplifying the algebra, especially for odd or even functions."], ["APPLIED", "Two companies' expense rates are \\(E_1(t)=50+3t\\) and \\(E_2(t)=80-t\\) over \\([0,12]\\) months. Set up the area between these curves after finding their crossing point, and interpret it.", "They cross at \\(t=7.5\\). Set up the two piecewise integrals before/after \\(t=7.5\\); the total represents the cumulative expense difference between the companies over the year."]], [["BASIC", "Find the area between \\(y=6-x\\) and \\(y=x^2\\) (find intersection points first).", "\\(6-x=x^2\\Rightarrow(x+3)(x-2)=0\\Rightarrow x=-3,2\\). Area \\(=\\int_{-3}^2[(6-x)-x^2]dx\\), evaluated directly."], ["WITH RESPECT TO Y", "Find the area between \\(x=y^2-2\\) and \\(x=y\\) by integrating with respect to \\(y\\) (find intersection points first).", "\\(y^2-y-2=0\\Rightarrow y=-1,2\\). Area \\(=\\int_{-1}^2[y-(y^2-2)]dy\\), evaluated directly."], ["MULTIPLE INTERSECTIONS", "Find the area enclosed between \\(y=x^4\\) and \\(y=x^2\\) (find all intersection points first).", "\\(x^2(x^2-1)=0\\Rightarrow x=0,\\pm1\\). By symmetry, total area \\(=2\\int_0^1(x^2-x^4)dx\\), since \\(x^2\\ge x^4\\) on \\((0,1)\\)."], ["ERROR ANALYSIS", "A student, computing the area between \\(y=x^2\\) and \\(y=x^4\\), integrates \\((x^2-x^4)\\) from \\(-2\\) to \\(2\\), including regions where the ordering has reversed. Explain the mistake.", "Outside \\([-1,1]\\), \\(x^4\\) actually exceeds \\(x^2\\) (e.g. at \\(x=2\\): \\(16>4\\)), so the 'top minus bottom' ordering valid inside \\([-1,1]\\) is no longer valid there; integrating past the actual intersection points without re-checking which curve is on top gives an incorrect combined result."], ["CONCEPTUAL", "Summarise the full procedure for finding the area between two curves, from intersection points to final computation.", "Set the two functions equal to find all intersection points; between each pair of consecutive intersections, determine which function is on top; integrate (top \u2212 bottom) over each sub-interval; sum the results (each non-negative if correctly ordered) for the total enclosed area."], ["APPLIED", "Two savings accounts grow at rates \\(g_1(t)=100e^{0.05t}\\) and \\(g_2(t)=120e^{0.03t}\\). Set up the area between these curves over \\([0,20]\\) years after estimating their crossing point, and interpret it.", "Setting \\(100e^{0.05t}=120e^{0.03t}\\) and solving gives the crossing time; the resulting area, split at that point, represents the cumulative difference in growth between the two accounts over the 20-year period."]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
