<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chain Rule</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Chain Rule</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Differentiate \\(f(x)=(3x+2)^5\\).", "Chain rule. Answer: \\(15(3x+2)^4\\)"], ["NESTED TWICE", "Differentiate \\(f(x)=\\sin(\\cos x)\\).", "Chain rule applied twice. Answer: \\(-\\sin x\\cos(\\cos x)\\)"], ["COMPOSITE", "Differentiate \\(f(x)=\\sqrt{\\sin x}\\).", "Chain rule. Answer: \\(\\dfrac{\\cos x}{2\\sqrt{\\sin x}}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=(x^2+1)^3\\) as \\(3(x^2+1)^2\\), forgetting the inner derivative. Correct it.", "Missing factor of \\(2x\\): correct answer is \\(6x(x^2+1)^2\\)."], ["CONCEPTUAL", "Explain intuitively, using 'rate of rates', why the chain rule multiplies derivatives rather than adds them.", "If \\(y\\) changes at rate \\(dy/du\\) per unit \\(u\\), and \\(u\\) changes at rate \\(du/dx\\) per unit \\(x\\), then the combined rate of \\(y\\) with respect to \\(x\\) compounds multiplicatively \u2014 each unit change in \\(x\\) produces \\(du/dx\\) units of change in \\(u\\), each of which produces \\(dy/du\\) units of change in \\(y\\)."], ["APPLIED", "If \\(y=(2x+1)^4\\) and \\(x\\) increases at 3 units/sec, find \\(dy/dt\\) at \\(x=1\\).", "\\(dy/dx=8(2x+1)^3\\); at \\(x=1\\): \\(8(3)^3=216\\). Then \\(dy/dt=216\\times3\\). Answer: \\(648\\)"]], [["BASIC", "Differentiate \\(f(x)=e^{x^2-1}\\).", "Chain rule. Answer: \\(2xe^{x^2-1}\\)"], ["NESTED TWICE", "Differentiate \\(f(x)=\\ln(\\sin(x^2))\\).", "Chain rule applied twice. Answer: \\(2x\\cot(x^2)\\)"], ["COMPOSITE", "Differentiate \\(f(x)=\\tan(\\sqrt{x})\\).", "Chain rule. Answer: \\(\\dfrac{\\sec^2(\\sqrt x)}{2\\sqrt x}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=\\cos(3x)\\) as \\(-\\sin(3x)\\), missing the chain rule factor. Correct it.", "Missing factor of \\(3\\): correct answer is \\(-3\\sin(3x)\\)."], ["CONCEPTUAL", "Explain why \\(d/dx[f(g(x))]\\) cannot just be \\(f'(g(x))\\) alone \u2014 why is the extra factor \\(g'(x)\\) required?", "\\(f'(g(x))\\) only measures how \\(f\\) responds to changes in its own input; it says nothing about how fast that input \\(g(x)\\) itself is changing with respect to \\(x\\). Both rates must be combined to capture the true rate of change of the composite."], ["APPLIED", "A sphere's volume is \\(V=\\tfrac43\\pi r^3\\), and its radius grows at 2 cm/s. Find \\(dV/dt\\) when \\(r=5\\).", "\\(dV/dr=4\\pi r^2=100\\pi\\) at \\(r=5\\). Then \\(dV/dt=100\\pi\\times2\\). Answer: \\(200\\pi\\)"]], [["BASIC", "Differentiate \\(f(x)=(1-2x)^{-3}\\).", "Chain rule. Answer: \\(6(1-2x)^{-4}\\)"], ["NESTED TWICE", "Differentiate \\(f(x)=\\sqrt{1+\\sqrt{x}}\\).", "Chain rule applied twice. Answer: \\(\\dfrac{1}{4\\sqrt{x}\\sqrt{1+\\sqrt{x}}}\\)"], ["COMPOSITE", "Differentiate \\(f(x)=e^{\\sin(2x)}\\).", "Chain rule. Answer: \\(2\\cos(2x)e^{\\sin(2x)}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=(5x-3)^4\\) and writes \\(f'(x)=4(5x-3)^3\\cdot x\\), using \\(x\\) instead of the inner derivative. Correct it.", "The inner derivative is \\(5\\), not \\(x\\): correct answer is \\(20(5x-3)^3\\)."], ["CONCEPTUAL", "Using Leibniz notation \\(dy/dx=dy/du\\cdot du/dx\\), explain how the chain rule can be thought of as 'cancelling' \\(du\\).", "Formally treating \\(dy/du\\) and \\(du/dx\\) as fractions, the \\(du\\) in the numerator of one and denominator of the other appear to cancel, leaving \\(dy/dx\\) \u2014 a useful mnemonic, even though differentials aren't literally fractions being cancelled."], ["APPLIED", "A balloon's radius is \\(r(t)=2+0.5t\\) cm, with surface area \\(S=4\\pi r^2\\). Find \\(dS/dt\\) at \\(t=2\\).", "\\(dS/dr=8\\pi r\\); \\(r(2)=3\\), so \\(dS/dr=24\\pi\\). Then \\(dS/dt=24\\pi\\times0.5\\). Answer: \\(12\\pi\\)"]], [["BASIC", "Differentiate \\(f(x)=\\ln(4x+1)\\).", "Chain rule. Answer: \\(\\dfrac{4}{4x+1}\\)"], ["NESTED TWICE", "Differentiate \\(f(x)=\\cos^2(3x)\\).", "Chain rule applied twice, simplifies with a double angle identity. Answer: \\(-3\\sin(6x)\\)"], ["COMPOSITE", "Differentiate \\(f(x)=1/\\sqrt{4-x^2}\\).", "Chain rule. Answer: \\(\\dfrac{x}{(4-x^2)^{3/2}}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=\\sqrt{x^2+4}\\) and writes \\(f'(x)=\\dfrac{1}{2\\sqrt{x^2+4}}\\), forgetting to multiply by the inner derivative. Correct it.", "Missing factor of \\(2x\\): correct answer is \\(\\dfrac{x}{\\sqrt{x^2+4}}\\)."], ["CONCEPTUAL", "For three nested functions, \\(d/dx[f(g(h(x)))]\\), state the chain rule and explain what each factor represents.", "\\(f'(g(h(x)))\\cdot g'(h(x))\\cdot h'(x)\\) \u2014 each factor is the rate of change of one layer with respect to the layer directly inside it, and multiplying all three compounds the rates through the whole chain."], ["APPLIED", "A cooling object's temperature is \\(T(t)=20+80e^{-0.1t}\\). Find the rate of change of temperature at \\(t=10\\).", "\\(T'(t)=-8e^{-0.1t}\\); at \\(t=10\\): \\(-8e^{-1}\\). Answer: \\(\\approx-2.94\\)\u00b0C/min"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
