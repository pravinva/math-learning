<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continuity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Continuity</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["DEFINITION CHECK", "Let \\(f(x)=\\dfrac{x^2-1}{x-1}\\) for \\(x\\ne1\\), and \\(f(1)=3\\). Is \\(f\\) continuous at \\(x=1\\)?", "The limit as \\(x\\to1\\) is \\(2\\) (factor and cancel), but \\(f(1)=3\\ne2\\). Answer: not continuous \u2014 a removable discontinuity."], ["CONCEPTUAL", "State the three conditions required for \\(f\\) to be continuous at \\(x=a\\).", "(1) \\(f(a)\\) is defined, (2) \\(\\lim_{x\\to a}f(x)\\) exists, (3) that limit equals \\(f(a)\\)."], ["PIECEWISE PARAMETER", "Find \\(c\\) so that \\(f(x)=x^2\\) for \\(x<2\\) and \\(f(x)=cx+1\\) for \\(x\\ge2\\) is continuous at \\(x=2\\).", "Left limit is \\(4\\); need \\(2c+1=4\\). Answer: \\(c=3/2\\)"], ["TYPE OF DISCONTINUITY", "Classify the discontinuity of \\(f(x)=1/(x-3)\\) at \\(x=3\\).", "The function grows without bound on either side. Answer: infinite discontinuity (vertical asymptote), not removable"], ["IVT APPLICATION", "Show that \\(x^3-x-1=0\\) has a root between \\(1\\) and \\(2\\).", "\\(f(1)=-1<0\\), \\(f(2)=5>0\\); since \\(f\\) is continuous, the Intermediate Value Theorem guarantees a sign change, so a root exists in \\((1,2)\\)."], ["CONCEPTUAL", "True or false: a function continuous on \\((0,1)\\) must be continuous on \\([0,1]\\).", "False \u2014 continuity on the open interval says nothing about the endpoints; \\(f\\) could be undefined or discontinuous at \\(0\\) or \\(1\\)."]], [["DEFINITION CHECK", "Is \\(f(x)=|x-2|\\) continuous at \\(x=2\\)?", "\\(f(2)=0\\), and the limit from both sides is \\(0\\). Answer: yes, continuous"], ["PIECEWISE PARAMETER", "Find \\(a\\) so that \\(f(x)=ax+1\\) for \\(x<1\\) and \\(f(x)=x^2\\) for \\(x\\ge1\\) is continuous at \\(x=1\\).", "Left limit \\(=a+1\\); right value \\(=1\\). Set \\(a+1=1\\). Answer: \\(a=0\\)"], ["TYPE OF DISCONTINUITY", "Classify the discontinuity of \\(f(x)=\\sin(x)/x\\) at \\(x=0\\) (undefined there).", "The limit exists (\\(=1\\)) even though \\(f(0)\\) is undefined. Answer: removable discontinuity"], ["IVT APPLICATION", "Use the Intermediate Value Theorem to show \\(\\cos x = x\\) has a solution in \\([0,1]\\).", "Let \\(g(x)=\\cos x - x\\): \\(g(0)=1>0\\), \\(g(1)=\\cos1-1\\approx-0.46<0\\). Sign change \\(\\Rightarrow\\) a root exists."], ["CONCEPTUAL", "Explain the difference between a \\emph{removable} and a \\emph{jump} discontinuity, with an example of each.", "Removable: the limit exists but doesn't match (or isn't defined as) \\(f(a)\\), e.g. \\((x^2-1)/(x-1)\\) at \\(x=1\\). Jump: left and right limits both exist but disagree, e.g. a step/piecewise function with a sudden level change."], ["DEFINITION CHECK", "Determine where \\(f(x)=\\dfrac{x-1}{x^2-1}\\) is discontinuous and classify each discontinuity.", "Simplify to \\(1/(x+1)\\) for \\(x\\ne1,-1\\). At \\(x=1\\): removable (limit \\(=1/2\\) exists but point undefined). At \\(x=-1\\): infinite discontinuity."]], [["DEFINITION CHECK", "Let \\(f(x)=\\sin(x)/x\\) for \\(x\\ne0\\), \\(f(0)=1\\). Is \\(f\\) continuous at \\(x=0\\)?", "The limit as \\(x\\to0\\) is \\(1\\), which equals \\(f(0)\\). Answer: yes, continuous"], ["PIECEWISE PARAMETER", "Find \\(k\\) so that \\(f(x)=kx+1\\) for \\(x\\le2\\) and \\(f(x)=3x-k\\) for \\(x>2\\) is continuous at \\(x=2\\).", "Left value \\(=2k+1\\); right limit \\(=6-k\\). Set \\(2k+1=6-k\\Rightarrow3k=5\\). Answer: \\(k=5/3\\)"], ["TYPE OF DISCONTINUITY", "Classify the discontinuity of the floor function \\(f(x)=\\lfloor x\\rfloor\\) at \\(x=2\\).", "Left limit \\(=1\\), right limit \\(=2\\), they disagree. Answer: jump discontinuity"], ["IVT APPLICATION", "A hiker's elevation \\(h(t)\\) is continuous with \\(h(0)=100\\)m and \\(h(3)=250\\)m. Must there be a time when elevation is \\(180\\)m?", "Yes \u2014 by the IVT, since \\(180\\) lies between \\(h(0)\\) and \\(h(3)\\) and \\(h\\) is continuous, some \\(t\\in(0,3)\\) gives \\(h(t)=180\\)."], ["CONCEPTUAL", "Can a function be continuous at a point but not differentiable there? Give an example.", "Yes \u2014 \\(f(x)=|x|\\) at \\(x=0\\) is continuous (no jump, no hole) but has a sharp corner, so no unique tangent slope exists."], ["DEFINITION CHECK", "Is \\(f(x)=x\\sin(1/x)\\) for \\(x\\ne0\\), \\(f(0)=0\\), continuous at \\(x=0\\)?", "Since \\(|x\\sin(1/x)|\\le|x|\\to0\\) (squeeze theorem), the limit is \\(0=f(0)\\). Answer: yes, continuous"]], [["DEFINITION CHECK", "Is \\(f(x)=1/(x-1)\\) continuous at \\(x=0\\)?", "At \\(x=0\\), \\(f\\) is defined, the limit exists, and they match (\\(f(0)=-1\\)). Answer: yes \u2014 the only discontinuity is at \\(x=1\\), not \\(x=0\\)"], ["PIECEWISE PARAMETER", "Find \\(m\\) so that \\(f(x)=x^2+1\\) for \\(x<1\\) and \\(f(x)=mx\\) for \\(x\\ge1\\) is continuous at \\(x=1\\).", "Left limit \\(=2\\); right value \\(=m\\). Answer: \\(m=2\\)"], ["TYPE OF DISCONTINUITY", "\\(f(x)=(x^2-4)/(x-2)\\) for \\(x\\ne2\\) has what kind of discontinuity at \\(x=2\\), and how would you redefine \\(f(2)\\) to remove it?", "Removable discontinuity; redefining \\(f(2)=4\\) (the limit value) makes it continuous."], ["IVT APPLICATION", "Show \\(e^x-3x=0\\) has a root in \\([0,1]\\).", "\\(g(0)=1>0\\), \\(g(1)=e-3\\approx-0.28<0\\). Sign change \\(\\Rightarrow\\) root exists by the IVT."], ["CONCEPTUAL", "Explain why every polynomial function is continuous everywhere.", "Polynomials are built from sums and products of constants and \\(x\\) (both continuous), and continuity is preserved under addition and multiplication \u2014 so every polynomial is continuous on all of \\(\\mathbb{R}\\)."], ["DEFINITION CHECK", "Find all \\(x\\in[0,2\\pi]\\) where \\(f(x)=\\tan x\\) is discontinuous, and classify each.", "Discontinuous at \\(x=\\pi/2\\) and \\(x=3\\pi/2\\) \u2014 both infinite discontinuities (vertical asymptotes)."]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
