<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Definite Integrals &amp; FTC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Definite Integrals &amp; FTC</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC EVALUATION", "Evaluate \\(\\int_1^3(2x+1)\\,dx\\) using the FTC.", "Antiderivative \\(x^2+x\\); \\((9+3)-(1+1)\\). Answer: \\(10\\)"], ["FTC1 APPLICATION", "Find \\(\\dfrac{d}{dx}\\int_2^x(t^3+1)\\,dt\\) using FTC Part 1.", "Direct application. Answer: \\(x^3+1\\)"], ["FTC1 WITH CHAIN RULE", "Find \\(\\dfrac{d}{dx}\\int_0^{x^2}\\cos(t)\\,dt\\).", "Chain rule: \\(\\cos(x^2)\\cdot2x\\). Answer: \\(2x\\cos(x^2)\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_0^\\pi\\sin(x)\\,dx\\) and gets \\(-2\\) due to a sign error. Find the mistake and the correct value.", "Antiderivative is \\(-\\cos x\\); \\([-\\cos x]_0^\\pi=-\\cos\\pi-(-\\cos0)=1+1\\). Correct answer: \\(2\\)"], ["CONCEPTUAL", "Explain why the FTC is considered the 'bridge' between differentiation and integration.", "It shows the two processes are inverses of each other: differentiating an accumulation function recovers the original integrand (Part 1), and antiderivatives let us evaluate definite integrals via simple arithmetic instead of limits of sums (Part 2)."], ["APPLIED", "If \\(v(t)=3t^2\\) m/s, find the distance travelled from \\(t=0\\) to \\(t=4\\) using the FTC.", "\\(\\int_0^4 3t^2\\,dt=[t^3]_0^4\\). Answer: \\(64\\) m"]], [["BASIC EVALUATION", "Evaluate \\(\\int_0^2(3x^2-4x)\\,dx\\).", "Antiderivative \\(x^3-2x^2\\); \\((8-8)-(0-0)\\). Answer: \\(0\\)"], ["FTC1 APPLICATION", "Find \\(\\dfrac{d}{dx}\\int_x^5 e^t\\,dt\\) (the variable is the lower limit).", "Reversed limits flip the sign. Answer: \\(-e^x\\)"], ["FTC1 WITH CHAIN RULE", "Find \\(\\dfrac{d}{dx}\\int_1^{\\sqrt{x}}\\ln(t)\\,dt\\).", "Chain rule. Answer: \\(\\dfrac{\\ln(\\sqrt{x})}{2\\sqrt{x}}\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_1^4\\dfrac1x\\,dx\\) using the power rule \\((x^0/0)\\), getting \\(3\\). Identify the mistake.", "The power rule doesn't apply at \\(n=-1\\); the antiderivative is \\(\\ln|x|\\), giving \\(\\ln4-\\ln1\\). Correct answer: \\(\\ln4\\)"], ["CONCEPTUAL", "Explain why \\(\\int_a^b f(x)\\,dx\\) gives a net signed area rather than a total area.", "Regions where \\(f\\) is negative subtract from the running total rather than add; computing a 'total area' instead requires splitting the interval at the zeros of \\(f\\) and taking absolute values of each piece."], ["APPLIED", "Production rate is \\(r(t)=50+2t\\) units/hour. Find total units produced from \\(t=0\\) to \\(t=8\\).", "\\(\\int_0^8(50+2t)\\,dt=[50t+t^2]_0^8=400+64\\). Answer: \\(464\\) units"]], [["BASIC EVALUATION", "Evaluate \\(\\int_{-1}^{2}(x^2-x)\\,dx\\).", "Antiderivative \\(x^3/3-x^2/2\\); evaluate at both bounds and subtract. Answer: \\(3/2\\)"], ["FTC1 APPLICATION", "Find \\(\\dfrac{d}{dx}\\int_0^x\\sqrt{1+t^2}\\,dt\\).", "Direct application of FTC Part 1. Answer: \\(\\sqrt{1+x^2}\\)"], ["FTC1 WITH CHAIN RULE", "Use the Leibniz rule to find \\(\\dfrac{d}{dx}\\int_x^{3x}t^2\\,dt\\).", "\\((3x)^2\\cdot3-x^2\\cdot1=27x^2-x^2\\). Answer: \\(26x^2\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_0^{2\\pi}\\cos(x)\\,dx\\) and reports a nonzero answer. Find the correct value and explain why.", "Antiderivative \\(\\sin x\\); \\([\\sin x]_0^{2\\pi}=\\sin(2\\pi)-\\sin0\\). Answer: \\(0\\) \u2014 a full period of cosine gives zero net area"], ["CONCEPTUAL", "Why must the integrand be continuous on \\([a,b]\\) for the FTC to apply directly?", "If the integrand has a discontinuity (especially an infinite one) inside the interval, the antiderivative may not be well-behaved there, and simply evaluating \\(F(b)-F(a)\\) may not correctly represent the accumulated signed area \u2014 the integral could even fail to converge."], ["APPLIED", "A building loses heat at rate \\(H(t)=200-10t\\) watts (t in hours). Find the total heat lost over the first 10 hours.", "\\(\\int_0^{10}(200-10t)\\,dt=[200t-5t^2]_0^{10}=2000-500\\). Answer: \\(1500\\) watt-hours"]], [["BASIC EVALUATION", "Evaluate \\(\\int_1^e\\left(\\dfrac1x+x\\right)dx\\).", "Antiderivative \\(\\ln|x|+x^2/2\\); evaluate at both bounds. Answer: \\(\\tfrac12+\\tfrac{e^2}{2}\\)"], ["FTC1 APPLICATION", "Find \\(\\dfrac{d}{dx}\\int_{-2}^x(t^3-4t)\\,dt\\).", "Direct application of FTC Part 1. Answer: \\(x^3-4x\\)"], ["FTC1 WITH CHAIN RULE", "Find \\(\\dfrac{d}{dx}\\int_0^{\\ln x}e^t\\,dt\\).", "Chain rule: \\(e^{\\ln x}\\cdot(1/x)=x\\cdot(1/x)\\). Answer: \\(1\\)"], ["ERROR ANALYSIS", "A student evaluates \\(\\int_0^1 x^{-2}\\,dx\\) directly via the FTC, getting \\(-2\\), without noticing \\(x=0\\) is inside the interval. What's wrong?", "The FTC requires continuity across the whole interval; \\(1/x^2\\) has an infinite discontinuity at \\(x=0\\), so the FTC cannot be applied directly \u2014 this integral is actually improper and diverges."], ["CONCEPTUAL", "Explain how the two parts of the FTC relate to each other.", "Part 1 says differentiating an accumulation function \\(\\int_a^x f(t)dt\\) recovers \\(f(x)\\); Part 2 says \\(\\int_a^b f(x)dx=F(b)-F(a)\\) for any antiderivative \\(F\\). Part 2 follows from Part 1, since it identifies antiderivatives as exactly the functions whose derivative recovers \\(f\\), letting definite integrals be evaluated without limits of Riemann sums."], ["APPLIED", "A car's velocity is \\(v(t)=40-2t^2\\) km/h until it stops. Find the total distance travelled until \\(v=0\\).", "Stops when \\(t=\\sqrt{20}=2\\sqrt5\\). Distance \\(=\\int_0^{2\\sqrt5}(40-2t^2)dt=[40t-\\tfrac23t^3]_0^{2\\sqrt5}\\). Answer: \\(\\dfrac{160\\sqrt5}{3}\\) km"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
