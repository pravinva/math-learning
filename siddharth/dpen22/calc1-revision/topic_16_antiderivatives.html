<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antiderivatives — Basic Rules</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Antiderivatives — Basic Rules</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find \\(\\int(4x^3-2x+5)\\,dx\\).", "Term by term. Answer: \\(x^4-x^2+5x+C\\)"], ["REWRITE FIRST", "Find \\(\\int\\dfrac{3}{x^2}\\,dx\\) by rewriting as a power of \\(x\\).", "Rewrite as \\(3x^{-2}\\). Answer: \\(-3/x+C\\)"], ["TRIG", "Find \\(\\int(2\\sin x+3\\cos x)\\,dx\\).", "Term by term. Answer: \\(-2\\cos x+3\\sin x+C\\)"], ["ERROR ANALYSIS", "A student writes \\(\\int x^{-1}dx=\\dfrac{x^0}{0}+C\\). Explain the error and give the correct answer.", "The power rule fails at \\(n=-1\\) (division by zero); the correct antiderivative is \\(\\ln|x|+C\\)."], ["CONCEPTUAL", "Explain why every indefinite integral needs a '\\(+C\\)', using two different antiderivatives of the same function as an example.", "Both \\(x^2\\) and \\(x^2+5\\) have derivative \\(2x\\); the \\(+C\\) captures this whole family, since any two antiderivatives of the same function differ only by a constant."], ["APPLIED \u2014 INITIAL VALUE", "A particle's velocity is \\(v(t)=6t-4\\). If \\(s(0)=3\\), find \\(s(t)\\).", "\\(s(t)=3t^2-4t+C\\); \\(s(0)=C=3\\). Answer: \\(s(t)=3t^2-4t+3\\)"]], [["BASIC", "Find \\(\\int(x^5+3x^2-7)\\,dx\\).", "Term by term. Answer: \\(\\dfrac{x^6}{6}+x^3-7x+C\\)"], ["REWRITE FIRST", "Find \\(\\int\\dfrac{1}{2\\sqrt{x}}\\,dx\\) by rewriting as a power of \\(x\\).", "Rewrite as \\(\\tfrac12x^{-1/2}\\). Answer: \\(\\sqrt{x}+C\\)"], ["TRIG", "Find \\(\\int\\sec^2(x)\\,dx\\) and \\(\\int\\csc^2(x)\\,dx\\) side by side, noting the sign difference.", "Answer: \\(\\tan x+C\\) and \\(-\\cot x+C\\)"], ["ERROR ANALYSIS", "A student integrates \\(\\int e^{3x}dx\\) as \\(e^{3x}+C\\), forgetting to divide by 3. Correct it.", "Correct answer: \\(\\tfrac13e^{3x}+C\\)"], ["CONCEPTUAL", "Explain why \\(\\int(ax+b)^n\\,dx\\) needs an extra division step, relating it to reversing the chain rule.", "Differentiating \\((ax+b)^{n+1}\\) produces an extra factor of \\(a\\) from the chain rule, so integrating must divide by that same \\(a\\) to compensate."], ["APPLIED \u2014 INITIAL VALUE", "Water flows into a tank at rate \\(r(t)=5-t\\) (L/min), starting with 20L. Find \\(V(t)\\).", "\\(V(t)=5t-t^2/2+C\\); \\(V(0)=C=20\\). Answer: \\(V(t)=5t-t^2/2+20\\)"]], [["BASIC", "Find \\(\\int(6x^{1/2}-4x^{-1/2})\\,dx\\).", "Term by term. Answer: \\(4x^{3/2}-8x^{1/2}+C\\)"], ["REWRITE FIRST", "Find \\(\\int\\dfrac{x^2+1}{x}\\,dx\\) by splitting the fraction first.", "Split into \\(x+1/x\\). Answer: \\(\\dfrac{x^2}{2}+\\ln|x|+C\\)"], ["TRIG", "Find \\(\\int(\\sin(2x)+\\cos(3x))\\,dx\\).", "Reverse chain rule on each term. Answer: \\(-\\tfrac12\\cos(2x)+\\tfrac13\\sin(3x)+C\\)"], ["ERROR ANALYSIS", "A student integrates \\(\\int\\dfrac{1}{1+x^2}dx\\) as \\(\\ln(1+x^2)+C\\), confusing it with a log-rule integral. Correct it.", "Correct answer: \\(\\arctan(x)+C\\)"], ["CONCEPTUAL", "Explain why \\(\\int\\dfrac{f'(x)}{f(x)}\\,dx=\\ln|f(x)|+C\\), connecting it to the chain rule in reverse.", "Differentiating \\(\\ln|f(x)|\\) via the chain rule gives \\(f'(x)/f(x)\\) exactly, so integrating that expression must reverse the process and recover \\(\\ln|f(x)|\\)."], ["APPLIED \u2014 INITIAL VALUE", "An object's acceleration is \\(a(t)=12t\\), with \\(v(0)=2\\) and \\(s(0)=0\\). Find \\(s(t)\\) by integrating twice.", "\\(v(t)=6t^2+2\\); \\(s(t)=2t^3+2t+C\\), \\(s(0)=C=0\\). Answer: \\(s(t)=2t^3+2t\\)"]], [["BASIC", "Find \\(\\int(x^3-2x^2+x-1)\\,dx\\).", "Term by term. Answer: \\(\\dfrac{x^4}{4}-\\dfrac{2x^3}{3}+\\dfrac{x^2}{2}-x+C\\)"], ["REWRITE FIRST", "Find \\(\\int(\\sqrt{x})^3\\,dx\\) by rewriting as a power of \\(x\\) first.", "Rewrite as \\(x^{3/2}\\). Answer: \\(\\dfrac{2}{5}x^{5/2}+C\\)"], ["TRIG", "Find \\(\\int(\\sec x\\tan x-\\csc x\\cot x)\\,dx\\).", "Standard antiderivatives. Answer: \\(\\sec x+\\csc x+C\\)"], ["ERROR ANALYSIS", "A student computes \\(\\int\\cos(5x)dx\\) as \\(\\sin(5x)+C\\), forgetting the reverse chain rule factor. Correct it.", "Correct answer: \\(\\tfrac15\\sin(5x)+C\\)"], ["CONCEPTUAL", "Explain why finding an antiderivative can be much harder than finding a derivative, even for simple-looking functions like \\(e^{-x^2}\\).", "Differentiation always follows systematic, mechanically combinable rules (product, quotient, chain); integration is essentially reverse-engineering those rules, and many elementary-looking functions (like \\(e^{-x^2}\\)) simply have no antiderivative expressible in terms of standard functions."], ["APPLIED \u2014 INITIAL VALUE", "A population grows at rate \\(P'(t)=100e^{0.02t}\\), with \\(P(0)=5000\\). Find \\(P(t)\\).", "\\(\\int100e^{0.02t}dt=5000e^{0.02t}+C\\); \\(P(0)=5000+C=5000\\Rightarrow C=0\\). Answer: \\(P(t)=5000e^{0.02t}\\)"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
