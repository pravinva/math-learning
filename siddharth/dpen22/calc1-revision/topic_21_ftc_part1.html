<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTC Part 1 — Accumulation Functions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>FTC Part 1 — Accumulation Functions</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find \\(\\dfrac{d}{dx}\\int_0^x\\sin(t)\\,dt\\).", "Direct application of FTC Part 1. Answer: \\(\\sin(x)\\)"], ["BASIC", "Find \\(\\dfrac{d}{dx}\\int_1^x(t^2+3)\\,dt\\).", "Direct application of FTC Part 1. Answer: \\(x^2+3\\)"], ["REVERSED LIMITS", "Find \\(\\dfrac{d}{dx}\\int_x^5\\cos(t)\\,dt\\).", "Reversed limits flip the sign. Answer: \\(-\\cos(x)\\)"], ["CHAIN RULE COMBO", "Find \\(\\dfrac{d}{dx}\\int_0^{x^2}e^t\\,dt\\).", "Chain rule: \\(e^{x^2}\\cdot2x\\). Answer: \\(2xe^{x^2}\\)"], ["ERROR ANALYSIS", "A student computes \\(d/dx\\int_0^xt^2dt\\) by first fully integrating, then differentiating the result. Explain the quicker approach.", "FTC Part 1 says this derivative is simply the integrand evaluated at the upper limit \u2014 no need to integrate first at all. Answer: \\(x^2\\)"], ["CONCEPTUAL", "Explain in your own words what FTC Part 1 says, and why it makes intuitive sense.", "The derivative of an accumulation function \\(\\int_a^xf(t)dt\\) with respect to \\(x\\) is simply \\(f(x)\\); this makes sense because asking how fast accumulated area grows as \\(x\\) increases is exactly asking for the 'height' of the function at \\(x\\)."]], [["BASIC", "Find \\(\\dfrac{d}{dx}\\int_3^x\\ln(t)\\,dt\\).", "Direct application. Answer: \\(\\ln(x)\\)"], ["BASIC", "Find \\(\\dfrac{d}{dx}\\int_{-1}^x(t^3-2t)\\,dt\\).", "Direct application. Answer: \\(x^3-2x\\)"], ["REVERSED LIMITS", "Find \\(\\dfrac{d}{dx}\\int_x^{10}\\sqrt{t}\\,dt\\).", "Reversed limits flip the sign. Answer: \\(-\\sqrt{x}\\)"], ["CHAIN RULE COMBO", "Find \\(\\dfrac{d}{dx}\\int_0^{\\sin x}t^2\\,dt\\).", "Chain rule: \\(\\sin^2(x)\\cdot\\cos(x)\\). Answer: \\(\\sin^2(x)\\cos(x)\\)"], ["ERROR ANALYSIS", "A student applies FTC1 to \\(\\int_0^{x^3}\\cos(t)dt\\) and forgets the chain rule multiplier, writing just \\(\\cos(x^3)\\). Correct it.", "Correct answer: \\(3x^2\\cos(x^3)\\)"], ["CONCEPTUAL", "Explain why the chain rule is needed whenever the upper limit of an accumulation function is something other than plain \\(x\\).", "FTC1 applies directly only when the upper limit is exactly \\(x\\); when it's a function \\(g(x)\\) instead, the accumulation function is a composite \\(F(g(x))\\), so differentiating requires the chain rule, contributing an extra factor of \\(g'(x)\\)."]], [["BASIC", "Find \\(\\dfrac{d}{dx}\\int_5^xe^{-t}\\,dt\\).", "Direct application. Answer: \\(e^{-x}\\)"], ["BASIC", "Find \\(\\dfrac{d}{dx}\\int_2^x\\dfrac1t\\,dt\\).", "Direct application. Answer: \\(1/x\\)"], ["REVERSED LIMITS", "Find \\(\\dfrac{d}{dx}\\int_x^0t^3\\,dt\\) (rewrite first).", "Rewrite as \\(-\\int_0^xt^3dt\\). Answer: \\(-x^3\\)"], ["CHAIN RULE COMBO (LEIBNIZ)", "Find \\(\\dfrac{d}{dx}\\int_{2x}^{5x}t^2\\,dt\\) using the Leibniz rule.", "\\((5x)^2\\cdot5-(2x)^2\\cdot2=125x^2-8x^2\\). Answer: \\(117x^2\\)"], ["ERROR ANALYSIS", "A student applies FTC1 to \\(\\int_1^{2x}\\sqrt{t}\\,dt\\) and reports the derivative as \\(\\sqrt{2x}\\), omitting the chain rule factor. Correct it.", "Correct answer: \\(2\\sqrt{2x}\\)"], ["CONCEPTUAL", "Derive the Leibniz rule \\(d/dx\\int_{g(x)}^{h(x)}f(t)dt\\) by splitting the integral at a fixed point.", "Split as \\(-\\int_c^{g(x)}f(t)dt+\\int_c^{h(x)}f(t)dt\\); differentiating each piece via FTC1 and the chain rule gives \\(f(h(x))h'(x)-f(g(x))g'(x)\\)."]], [["BASIC", "Find \\(\\dfrac{d}{dx}\\int_0^x\\tan(t)\\,dt\\).", "Direct application. Answer: \\(\\tan(x)\\)"], ["BASIC", "Find \\(\\dfrac{d}{dx}\\int_{-2}^x(t^4+1)\\,dt\\).", "Direct application. Answer: \\(x^4+1\\)"], ["REVERSED LIMITS", "Find \\(\\dfrac{d}{dx}\\int_x^{\\pi}\\sin(t)\\,dt\\).", "Reversed limits flip the sign. Answer: \\(-\\sin(x)\\)"], ["CHAIN RULE COMBO", "Find \\(\\dfrac{d}{dx}\\int_1^{\\ln x}t^2\\,dt\\).", "Chain rule: \\((\\ln x)^2\\cdot(1/x)\\). Answer: \\(\\dfrac{(\\ln x)^2}{x}\\)"], ["ERROR ANALYSIS", "Given \\(\\int_0^{x^2}f(t)dt\\) for an unspecified continuous \\(f\\), a student tries to evaluate the integral explicitly first, getting stuck. What shortcut avoids this?", "FTC1 with the chain rule lets you differentiate directly without ever evaluating the integral: the derivative is simply \\(f(x^2)\\cdot2x\\), regardless of what \\(f\\) actually is, as long as it's continuous."], ["CONCEPTUAL", "Explain why FTC1 is described as showing 'differentiation and integration are inverse operations'.", "The formula \\(d/dx\\int_a^xf(t)dt=f(x)\\) shows that integrating \\(f\\) and then differentiating the result simply recovers \\(f(x)\\) \u2014 undoing the integration step completely, exactly what it means for two operations to be inverses."]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
