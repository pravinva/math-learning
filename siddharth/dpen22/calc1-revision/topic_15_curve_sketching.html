<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Curve Sketching</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Curve Sketching</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["FULL ANALYSIS - SETUP", "For \\(f(x)=x^3-3x\\), find the domain, intercepts, and symmetry.", "Domain: all reals. \\(x\\)-intercepts: \\(x(x^2-3)=0\\Rightarrow x=0,\\pm\\sqrt3\\). \\(y\\)-intercept: \\(0\\). Since \\(f(-x)=-f(x)\\), the function is odd (symmetric about the origin)."], ["CRITICAL POINTS & INTERVALS", "For \\(f(x)=x^3-3x\\), find critical points and intervals of increase/decrease.", "\\(f'(x)=3(x-1)(x+1)=0\\Rightarrow x=\\pm1\\). Answer: increasing for \\(x<-1\\) and \\(x>1\\), decreasing on \\((-1,1)\\)"], ["CONCAVITY & INFLECTION", "For \\(f(x)=x^3-3x\\), find the inflection point and concavity intervals.", "\\(f''(x)=6x=0\\Rightarrow x=0\\). Answer: concave down for \\(x<0\\), concave up for \\(x>0\\)"], ["ASYMPTOTES", "Find all asymptotes of \\(f(x)=(2x+1)/(x-3)\\).", "Vertical asymptote at \\(x=3\\) (denominator zero, numerator nonzero). Horizontal asymptote \\(y=2\\) (ratio of leading coefficients)."], ["ERROR ANALYSIS", "A student sketches a curve using only increase/decrease information, ignoring concavity entirely. What important features might their sketch be missing?", "Without concavity, the sketch could miss inflection points and misrepresent how sharply or gently the curve bends between critical points \u2014 the overall shape (e.g. whether it looks 'S-shaped' or simply monotonic between turning points) may be drawn incorrectly."], ["FULL SKETCH SYNTHESIS", "Combine all the information for \\(f(x)=x^3-3x\\) to describe the overall shape of its graph.", "An odd function through the origin and \\((\\pm\\sqrt3,0)\\), rising to a local max at \\((-1,2)\\), falling to a local min at \\((1,-2)\\), with an inflection point at the origin where concavity switches from down to up \u2014 a classic S-shaped cubic."]], [["FULL ANALYSIS - SETUP", "For \\(f(x)=x^4-4x^2\\), find the domain, intercepts, and symmetry.", "Domain: all reals. \\(x\\)-intercepts: \\(x^2(x^2-4)=0\\Rightarrow x=0,\\pm2\\). \\(y\\)-intercept: \\(0\\). Since \\(f(-x)=f(x)\\), the function is even (symmetric about the y-axis)."], ["CRITICAL POINTS & INTERVALS", "For \\(f(x)=x^4-4x^2\\), find critical points and intervals of increase/decrease.", "\\(f'(x)=4x(x^2-2)=0\\Rightarrow x=0,\\pm\\sqrt2\\). Answer: decreasing on \\((-\\infty,-\\sqrt2)\\), increasing on \\((-\\sqrt2,0)\\), decreasing on \\((0,\\sqrt2)\\), increasing on \\((\\sqrt2,\\infty)\\)"], ["CONCAVITY & INFLECTION", "For \\(f(x)=x^4-4x^2\\), find the inflection points and concavity intervals.", "\\(f''(x)=12x^2-8=0\\Rightarrow x=\\pm\\sqrt{2/3}\\). Answer: concave up outside these points, concave down between them"], ["ASYMPTOTES", "Find all asymptotes of \\(f(x)=1/(x^2-4)\\).", "Vertical asymptotes at \\(x=\\pm2\\); horizontal asymptote \\(y=0\\) (denominator's degree exceeds the numerator's)."], ["ERROR ANALYSIS", "A student finds three points where \\(f'(x)=0\\) but reports only two local extrema, missing that one might not be a true extremum. How should they determine which are genuine?", "Check the sign of \\(f'\\) on both sides of every critical point (first derivative test) \u2014 a genuine local extremum requires an actual sign change; a critical point where the sign doesn't change is not an extremum, regardless of how many critical points were found in total."], ["FULL SKETCH SYNTHESIS", "Using all the information found, describe the overall shape of \\(f(x)=x^4-4x^2\\).", "A symmetric 'W' shape (even function): the graph descends from both sides, dips to local minima at \\(x=\\pm\\sqrt2\\) (value \\(-4\\)), rises to a local max at \\(x=0\\) (value \\(0\\)), with inflection points near \\(x=\\pm0.82\\) marking where concavity flips between the dips and the central bump."]], [["FULL ANALYSIS - SETUP", "For \\(f(x)=(x^2-1)/x\\), find the domain and simplify before analysing further.", "Domain: all reals except \\(x=0\\). Simplify: \\(f(x)=x-1/x\\). There is a vertical asymptote at \\(x=0\\), and as \\(x\\to\\pm\\infty\\), \\(f(x)\\sim x\\) (an oblique/slant asymptote \\(y=x\\))."], ["CRITICAL POINTS & INTERVALS", "For \\(f(x)=x-1/x\\), find critical points and intervals of increase/decrease.", "\\(f'(x)=1+1/x^2\\), which is always positive (never zero). Answer: increasing on both \\((-\\infty,0)\\) and \\((0,\\infty)\\), with no critical points"], ["CONCAVITY & INFLECTION", "For \\(f(x)=x-1/x\\), find the concavity intervals (note \\(x=0\\) is excluded from the domain).", "\\(f''(x)=-2/x^3\\). Answer: concave up for \\(x<0\\), concave down for \\(x>0\\) \u2014 no true inflection point since \\(x=0\\) isn't in the domain"], ["ASYMPTOTES", "Identify all asymptotes (vertical, horizontal, and oblique) for \\(f(x)=(x^2+1)/x\\).", "Vertical asymptote at \\(x=0\\); oblique asymptote \\(y=x\\) (from \\(f(x)=x+1/x\\) via division)."], ["ERROR ANALYSIS", "A student assumes every rational function has a horizontal asymptote. Explain why \\(f(x)=(x^2+1)/x\\) does not, and what it has instead.", "When the numerator's degree exceeds the denominator's by exactly one, there is no horizontal asymptote \u2014 instead there's an oblique (slant) asymptote, found by polynomial long division."], ["FULL SKETCH SYNTHESIS", "Combine all the information for \\(f(x)=x-1/x\\) to describe its graph.", "Two branches separated by the vertical asymptote at \\(x=0\\), both strictly increasing; the left branch is concave up, the right concave down, and both approach the slant asymptote \\(y=x\\) as \\(|x|\\to\\infty\\)."]], [["FULL ANALYSIS - SETUP", "For \\(f(x)=xe^{-x}\\), find the domain, intercepts, and end behaviour.", "Domain: all reals. \\(x\\)-intercept (and \\(y\\)-intercept): \\(x=0\\). As \\(x\\to\\infty\\), \\(f(x)\\to0\\) (exponential decay dominates); as \\(x\\to-\\infty\\), \\(f(x)\\to-\\infty\\)."], ["CRITICAL POINTS & INTERVALS", "For \\(f(x)=xe^{-x}\\), find critical points and intervals of increase/decrease.", "\\(f'(x)=e^{-x}(1-x)=0\\Rightarrow x=1\\). Answer: increasing for \\(x<1\\), decreasing for \\(x>1\\)"], ["CONCAVITY & INFLECTION", "For \\(f(x)=xe^{-x}\\), find the inflection point and concavity intervals.", "\\(f''(x)=e^{-x}(x-2)=0\\Rightarrow x=2\\). Answer: concave down for \\(x<2\\), concave up for \\(x>2\\)"], ["ASYMPTOTES", "Identify the asymptote of \\(f(x)=xe^{-x}\\) as \\(x\\to\\infty\\), and explain why there's no corresponding asymptote as \\(x\\to-\\infty\\).", "As \\(x\\to\\infty\\), \\(f(x)\\to0\\), giving a horizontal asymptote \\(y=0\\); as \\(x\\to-\\infty\\), \\(f(x)\\to-\\infty\\) (unbounded), so no horizontal asymptote exists on that side."], ["ERROR ANALYSIS", "A student sketches \\(f(x)=xe^{-x}\\) but extends the horizontal asymptote \\(y=0\\) to both ends of the graph. Explain the mistake.", "The asymptote \\(y=0\\) only applies as \\(x\\to+\\infty\\); as \\(x\\to-\\infty\\) the function decreases without bound, so there's no horizontal asymptote on that side \u2014 the error is assuming end behaviour is always symmetric."], ["FULL SKETCH SYNTHESIS", "Using all the information found, describe the overall shape of \\(f(x)=xe^{-x}\\).", "The graph rises from \\(-\\infty\\) on the left, passes through the origin, climbs to a local max at \\(x=1\\) (value \\(1/e\\)), then decreases toward the horizontal asymptote \\(y=0\\) as \\(x\\to\\infty\\), with an inflection point at \\(x=2\\) marking where the curve's concavity flips from down to up as it flattens out."]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
