<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Standard Derivatives — Exponential &amp; Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Standard Derivatives — Exponential &amp; Log</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Differentiate \\(f(x)=3^x\\).", "Standard exponential-base derivative. Answer: \\(3^x\\ln3\\)"], ["LOG DIFFERENTIATION", "Use logarithmic differentiation to find \\(f'(x)\\) for \\(f(x)=x^{\\sin x}\\).", "Take \\(\\ln f=\\sin x\\ln x\\), differentiate implicitly: \\(f'/f=\\cos x\\ln x+\\sin x/x\\). Answer: \\(f'(x)=x^{\\sin x}\\left(\\cos x\\ln x+\\dfrac{\\sin x}{x}\\right)\\)"], ["COMBINATION", "Differentiate \\(f(x)=\\dfrac{\\ln(x^2+1)}{x}\\).", "Quotient rule. Answer: \\(\\dfrac{\\frac{2x^2}{x^2+1}-\\ln(x^2+1)}{x^2}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=e^{2x}\\) as \\(e^{2x}\\), forgetting the chain rule factor. Correct it.", "Missing factor of \\(2\\): correct answer is \\(2e^{2x}\\)."], ["CONCEPTUAL", "Derive \\(d/dx[\\ln x]\\) from the fact that \\(e^{\\ln x}=x\\), using implicit differentiation.", "Differentiate both sides: \\(e^{\\ln x}\\cdot(\\ln x)'=1\\); since \\(e^{\\ln x}=x\\), this gives \\(x\\cdot(\\ln x)'=1\\Rightarrow(\\ln x)'=1/x\\)."], ["APPLIED", "Bacteria grow as \\(N(t)=200e^{0.3t}\\). Find the growth rate at \\(t=5\\) and interpret it.", "\\(N'(t)=60e^{0.3t}\\); at \\(t=5\\): \\(60e^{1.5}\\approx268.8\\) bacteria per hour \u2014 the instantaneous growth rate at that time."]], [["BASIC", "Differentiate \\(f(x)=\\log_2(x)\\).", "Rewrite as \\(\\ln x/\\ln2\\). Answer: \\(\\dfrac{1}{x\\ln2}\\)"], ["LOG DIFFERENTIATION", "Use logarithmic differentiation to find \\(f'(x)\\) for \\(f(x)=(x^2+1)^x\\).", "\\(\\ln f=x\\ln(x^2+1)\\); \\(f'/f=\\ln(x^2+1)+\\dfrac{2x^2}{x^2+1}\\). Answer: \\(f'(x)=(x^2+1)^x\\left[\\ln(x^2+1)+\\dfrac{2x^2}{x^2+1}\\right]\\)"], ["COMBINATION", "Differentiate \\(f(x)=\\dfrac{e^x}{\\ln x}\\).", "Quotient rule. Answer: \\(\\dfrac{e^x(\\ln x-1/x)}{(\\ln x)^2}\\)"], ["ERROR ANALYSIS", "A student notes \\(\\ln(3x)=\\ln3+\\ln x\\) yet is confused why the derivative doesn't involve the \\(3\\) at all. Explain.", "\\(\\ln3\\) is a constant, so its derivative is \\(0\\); only the \\(\\ln x\\) term contributes, giving \\(1/x\\) \u2014 the same as differentiating \\(\\ln x\\) alone."], ["CONCEPTUAL", "Explain why \\(d/dx[a^x]=a^x\\ln a\\) but \\(d/dx[x^a]=ax^{a-1}\\), despite both looking like 'exponent rules'.", "In \\(a^x\\) the variable is in the exponent with a fixed base, requiring exponential differentiation (which brings down a factor of \\(\\ln a\\)); in \\(x^a\\) the variable is the base with a fixed exponent, which is the ordinary power rule. They're fundamentally different structures."], ["APPLIED", "Radioactive decay follows \\(A(t)=100e^{-0.05t}\\). Find the decay rate at \\(t=10\\) and interpret the sign.", "\\(A'(t)=-5e^{-0.05t}\\); at \\(t=10\\): \\(-5e^{-0.5}\\approx-3.03\\) \u2014 negative because the quantity is decreasing over time."]], [["BASIC", "Differentiate \\(f(x)=e^{-x^2}\\).", "Chain rule. Answer: \\(-2xe^{-x^2}\\)"], ["LOG DIFFERENTIATION", "Use logarithmic differentiation to find \\(f'(x)\\) for \\(f(x)=(2x+1)^{3x}\\).", "\\(\\ln f=3x\\ln(2x+1)\\); \\(f'/f=3\\ln(2x+1)+\\dfrac{6x}{2x+1}\\). Answer: \\(f'(x)=(2x+1)^{3x}\\left[3\\ln(2x+1)+\\dfrac{6x}{2x+1}\\right]\\)"], ["COMBINATION", "Differentiate \\(f(x)=\\ln(e^x+1)\\).", "Chain rule. Answer: \\(\\dfrac{e^x}{e^x+1}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=\\ln(x^3)\\) as \\(3/x^3\\). Correct it.", "Simplify first using log laws: \\(\\ln(x^3)=3\\ln x\\), so the correct derivative is \\(3/x\\)."], ["CONCEPTUAL", "Show that \\(d/dx[\\ln|x|]=1/x\\) holds for both positive and negative \\(x\\).", "For \\(x>0\\), \\(\\ln|x|=\\ln x\\), derivative \\(1/x\\). For \\(x<0\\), \\(\\ln|x|=\\ln(-x)\\); by the chain rule, \\(d/dx[\\ln(-x)]=\\dfrac{-1}{-x}=1/x\\). Either way the derivative is \\(1/x\\)."], ["APPLIED", "Sound intensity in decibels is \\(L(I)=10\\log_{10}(I/I_0)\\). Find \\(dL/dI\\) and interpret its behaviour for large \\(I\\).", "\\(dL/dI=\\dfrac{10}{I\\ln10}\\); as \\(I\\) grows, this rate shrinks \u2014 each additional unit of intensity produces a smaller increase in perceived loudness, reflecting the logarithmic (diminishing-sensitivity) nature of the decibel scale."]], [["BASIC", "Differentiate \\(f(x)=xe^{-x}\\).", "Product rule. Answer: \\(e^{-x}(1-x)\\)"], ["LOG DIFFERENTIATION", "Use logarithmic differentiation to find \\(f'(x)\\) for \\(f(x)=x^x\\).", "\\(\\ln f=x\\ln x\\); \\(f'/f=\\ln x+1\\). Answer: \\(f'(x)=x^x(\\ln x+1)\\)"], ["COMBINATION", "Differentiate \\(f(x)=\\ln\\left(\\sqrt{x^2+1}\\right)\\) by simplifying first.", "Rewrite as \\(\\tfrac12\\ln(x^2+1)\\). Answer: \\(\\dfrac{x}{x^2+1}\\)"], ["ERROR ANALYSIS", "A student differentiates \\(f(x)=5e^x\\) and writes \\(5e^x\\cdot x\\), mistakenly adding an extra factor of \\(x\\). Correct it.", "The exponent is just \\(x\\) (derivative \\(1\\)), so no extra factor is needed: the correct derivative is \\(5e^x\\)."], ["CONCEPTUAL", "Compare the derivatives of \\(e^x\\), \\(\\ln x\\), and \\(x^n\\) in terms of how 'self-referential' each is.", "\\(e^x\\) is its own derivative \u2014 uniquely self-reproducing. \\(\\ln x\\) differentiates down to a simpler power function, \\(1/x\\). \\(x^n\\) differentiates to another power function of one lower degree, following a clear reduction pattern rather than reproducing itself."], ["APPLIED", "An investment grows as \\(V(t)=1000e^{0.04t}\\). Find the instantaneous growth rate at \\(t=10\\).", "\\(V'(t)=40e^{0.04t}\\); at \\(t=10\\): \\(40e^{0.4}\\). Answer: \\(\\approx\\$59.67\\)/year"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
