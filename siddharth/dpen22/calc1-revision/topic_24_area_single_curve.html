<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Area Under a Single Curve</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
:root{
  --paper:#F7F4EC; --grid:#E1DBC8; --ink:#1E2A42; --ink-soft:#4A5570;
  --accent:#C1440E; --accent-soft:#E8C9B8; --correct:#2F6B4F; --correct-bg:#E4EEE7;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;
  background:linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px, var(--paper);
  color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
header h1{font-size:1.6rem;margin:0 0 4px;}
header .sub{font-family:'Trebuchet MS',sans-serif;color:var(--ink-soft);font-size:0.9rem;}
.setbar{display:flex;gap:6px;margin-bottom:18px;align-items:center;font-family:'Trebuchet MS',sans-serif;}
.setbar .label{font-size:0.8rem;color:var(--ink-soft);margin-right:6px;}
.setbar button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
  background:var(--paper);color:var(--accent);font-weight:bold;cursor:pointer;}
.setbar button.active{background:var(--accent);color:#fff;}
.progress{font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-left:auto;}
.qcard{background:#FFFEFB;border:1px solid var(--grid);border-left:4px solid var(--accent);
  border-radius:2px;padding:14px 16px;margin-bottom:10px;}
.qcard .qtag{font-family:'Trebuchet MS',sans-serif;font-size:0.68rem;color:var(--accent);
  font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.qcard .qtext{margin:6px 0 8px;font-size:1.02rem;line-height:1.55;}
.qcard button.reveal{font-family:'Trebuchet MS',sans-serif;font-size:0.76rem;background:none;
  border:1px solid var(--ink-soft);color:var(--ink-soft);padding:4px 10px;border-radius:12px;cursor:pointer;}
.qcard .answer{display:none;margin-top:10px;padding:10px 12px;background:var(--correct-bg);
  border-left:3px solid var(--correct);border-radius:2px;font-size:0.95rem;color:#20402d;}
.qcard .answer.show{display:block;}
.qcard.answered{border-left-color:var(--correct);}
footer{text-align:center;font-family:'Trebuchet MS',sans-serif;font-size:0.78rem;color:var(--ink-soft);margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Area Under a Single Curve</h1>
  <div class="sub">DPEN022 Calc1 · 4 sets · 6 questions each</div>
</header>
<div class="setbar" id="setBar"></div>
<div id="questions"></div>
<footer>Each set mixes computational, conceptual, error-analysis, and applied question types — not repeated drills</footer>
</div>

<script>
const SETS = [[["BASIC", "Find the area under \\(y=x^2+1\\) from \\(x=0\\) to \\(x=3\\).", "\\(\\int_0^3(x^2+1)dx=[x^3/3+x]_0^3=9+3\\). Answer: \\(12\\)"], ["NEGATIVE-REGION CHECK", "Find the area under \\(y=x-2\\) from \\(x=0\\) to \\(x=2\\) (the curve is below the axis here).", "Since the curve lies below the x-axis, area is the absolute value of the net integral: \\(\\int_0^2(x-2)dx=-2\\); area \\(=|-2|\\). Answer: \\(2\\)"], ["TRIG", "Find the area under \\(y=\\sec^2(x)\\) from \\(x=0\\) to \\(x=\\pi/4\\).", "\\(\\int_0^{\\pi/4}\\sec^2x\\,dx=[\\tan x]_0^{\\pi/4}\\). Answer: \\(1\\)"], ["ERROR ANALYSIS", "A student, asked for the area under \\(y=e^{-x^2}\\) from 0 to 1, can't find an elementary antiderivative and concludes the area doesn't exist. Explain the misconception.", "The area itself is a well-defined finite number (since \\(e^{-x^2}\\) is continuous and bounded on \\([0,1]\\)); what doesn't exist is an elementary closed-form antiderivative \u2014 this would require numerical methods or a special function rather than the FTC in elementary form."], ["CONCEPTUAL", "Explain how 'area under a curve' is defined more rigorously via Riemann sums.", "The area is the limit of sums of rectangle areas (heights times widths) as the rectangles become infinitely thin and numerous; the definite integral is precisely this limiting value, giving a rigorous definition of area beyond simple geometric shapes."], ["APPLIED", "A solar panel generates power at rate \\(P(t)=8-0.5t^2\\) kW, valid until output reaches zero. Find the total energy generated.", "Power reaches zero at \\(t=4\\). Energy \\(=\\int_0^4(8-0.5t^2)dt=[8t-t^3/6]_0^4=32-64/6\\). Answer: \\(\\approx21.33\\)kWh"]], [["BASIC", "Find the area under \\(y=\\sqrt{x+1}\\) from \\(x=0\\) to \\(x=3\\).", "\\(\\int_0^3\\sqrt{x+1}\\,dx=[\\tfrac23(x+1)^{3/2}]_0^3=\\tfrac{16}{3}-\\tfrac23\\). Answer: \\(14/3\\)"], ["NEGATIVE-REGION CHECK", "Find the area under \\(y=2-x^2\\) from \\(x=-2\\) to \\(x=2\\) (the curve dips negative near the ends).", "Roots at \\(x=\\pm\\sqrt2\\); split into the positive middle piece and the two negative outer pieces, taking absolute values of the outer pieces before summing all three."], ["TRIG", "Find the area under \\(y=\\csc^2(x)\\) from \\(x=\\pi/4\\) to \\(x=\\pi/2\\).", "\\(\\int_{\\pi/4}^{\\pi/2}\\csc^2x\\,dx=[-\\cot x]_{\\pi/4}^{\\pi/2}=0-(-1)\\). Answer: \\(1\\)"], ["ERROR ANALYSIS", "A student computes 'the area under \\(y=1/x^2\\) from \\(-1\\) to \\(1\\)' by directly applying the FTC, not noticing the function is undefined at \\(x=0\\) inside the interval. Explain the issue.", "The FTC requires continuity throughout the interval; since \\(1/x^2\\) has an infinite discontinuity at \\(x=0\\) (inside \\([-1,1]\\)), the FTC can't be applied directly \u2014 this is an improper integral that actually diverges (infinite area)."], ["CONCEPTUAL", "Explain why area calculated via a definite integral matches 'adding up infinitely many infinitesimally thin rectangles'.", "Each thin rectangle of width \\(dx\\) and height \\(f(x)\\) has area \\(f(x)dx\\); summing infinitely many across the interval (the limiting case of a Riemann sum) reconstructs the exact area under the curve, refining the rough rectangle approximation into an exact value."], ["APPLIED", "A well pumps water at rate \\(r(t)=12e^{-0.05t}\\) L/min. Find the total volume pumped over the first 20 minutes.", "\\(\\int_0^{20}12e^{-0.05t}dt=[-240e^{-0.05t}]_0^{20}=240(1-e^{-1})\\). Answer: \\(\\approx151.7\\)L"]], [["BASIC", "Find the area under \\(y=4x-x^3\\) from \\(x=0\\) to \\(x=2\\) (check the sign of the integrand first).", "The function is non-negative on \\([0,2]\\) (roots at \\(0,2\\)). \\(\\int_0^2(4x-x^3)dx=[2x^2-x^4/4]_0^2=8-4\\). Answer: \\(4\\)"], ["NEGATIVE-REGION CHECK", "Find the area under \\(y=\\sin(x)-\\cos(x)\\) from \\(x=0\\) to \\(x=\\pi\\) (check where the integrand changes sign).", "Crosses zero where \\(\\tan x=1\\), i.e. \\(x=\\pi/4\\); split into \\(\\int_0^{\\pi/4}\\) (negative, take absolute value) and \\(\\int_{\\pi/4}^\\pi\\) (positive), then sum."], ["TRIG", "Find the area under \\(y=3\\sin(x)\\) from \\(x=0\\) to \\(x=\\pi\\).", "\\(\\int_0^\\pi3\\sin x\\,dx=[-3\\cos x]_0^\\pi=3-(-3)\\). Answer: \\(6\\)"], ["ERROR ANALYSIS", "A student computes the area under \\(y=x^3\\) from \\(-2\\) to \\(2\\) as a single integral and reports \\(0\\) as 'the area'. Explain the misconception.", "Since \\(x^3\\) is negative on \\((-2,0)\\) and positive on \\((0,2)\\), the single net signed integral cancels to \\(0\\), but the true geometric area (treating both regions as positive) is nonzero; splitting at \\(x=0\\) and adding absolute values of each piece is required."], ["CONCEPTUAL", "Explain why checking the sign of the integrand is an essential first step before computing 'the area under a curve'.", "If the function is negative anywhere in the interval, a single direct integral won't equal the true geometric area (it undercounts, since negative regions subtract); checking the sign first reveals whether splitting and taking absolute values is necessary."], ["APPLIED", "A city's water usage rate is \\(u(t)=500+50\\sin(\\pi t/12)\\) L/hr over a 24-hour day. Find the total water used.", "The sine term integrates to zero over the full period, leaving \\(500\\times24\\). Answer: \\(12000\\)L"]], [["BASIC", "Find the area under \\(y=\\cos(2x)\\) from \\(x=0\\) to \\(x=\\pi/4\\).", "\\(\\int_0^{\\pi/4}\\cos(2x)dx=[\\tfrac12\\sin(2x)]_0^{\\pi/4}\\). Answer: \\(1/2\\)"], ["NEGATIVE-REGION CHECK", "Find the area under \\(y=x^2-1\\) from \\(x=-2\\) to \\(x=2\\) (splitting at the roots).", "Roots at \\(x=\\pm1\\); negative in between, positive outside. Total area \\(=\\int_{-2}^{-1}(x^2-1)dx+\\left|\\int_{-1}^1(x^2-1)dx\\right|+\\int_1^2(x^2-1)dx\\), computed piecewise."], ["TRIG", "Find the area under \\(y=\\sec(x)\\tan(x)\\) from \\(x=0\\) to \\(x=\\pi/3\\).", "\\(\\int_0^{\\pi/3}\\sec x\\tan x\\,dx=[\\sec x]_0^{\\pi/3}=2-1\\). Answer: \\(1\\)"], ["ERROR ANALYSIS", "A student, finding the area under \\(y=x^2-1\\) from \\(-2\\) to \\(2\\), integrates the whole interval in one step without splitting at the roots. Why was splitting necessary?", "Since the function is negative between \\(-1\\) and \\(1\\), integrating straight through lets that negative contribution partially cancel the positive outer regions; splitting at the roots and taking the absolute value of the negative middle piece avoids this undercounting."], ["CONCEPTUAL", "Summarise the complete procedure for finding the area under a curve that might dip below the x-axis.", "Find the roots within the interval; split the interval at these roots; integrate each piece separately; take the absolute value of any piece where the integral is negative; sum all the (now non-negative) pieces for the total area."], ["APPLIED", "A rocket's fuel consumption rate is \\(f(t)=200-4t\\) kg/min, valid until fuel runs out. Find the total fuel consumed.", "Rate reaches zero at \\(t=50\\). Fuel \\(=\\int_0^{50}(200-4t)dt=[200t-2t^2]_0^{50}=10000-5000\\). Answer: \\(5000\\)kg"]]];

function render(){
  const setBar = document.getElementById('setBar');
  setBar.innerHTML = '<span class="label">Set</span>';
  SETS.forEach((_,i)=>{
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i===window.currentSet) b.classList.add('active');
    b.onclick = ()=>{ window.currentSet=i; render(); };
    setBar.appendChild(b);
  });
  const prog = document.createElement('span');
  prog.className='progress';
  prog.textContent = `Set ${window.currentSet+1} of ${SETS.length} · ${SETS[0].length} questions`;
  setBar.appendChild(prog);

  const qDiv = document.getElementById('questions');
  qDiv.innerHTML = '';
  SETS[window.currentSet].forEach((triple)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qtag">${triple[0]}</div>
      <div class="qtext">${triple[1]}</div>
      <button class="reveal">Show answer</button>
      <div class="answer">${triple[2]}</div>
    `;
    const btn = card.querySelector('.reveal');
    const ans = card.querySelector('.answer');
    btn.onclick = ()=>{
      ans.classList.toggle('show');
      card.classList.toggle('answered', ans.classList.contains('show'));
      btn.textContent = ans.classList.contains('show') ? 'Hide answer' : 'Show answer';
    };
    qDiv.appendChild(card);
  });
  if(window.MathJax && MathJax.typesetPromise){ MathJax.typesetPromise(); }
}
window.currentSet = 0;
render();
</script>
</body>
</html>
