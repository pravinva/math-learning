<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timed Test Book Template</title>
  <style>
    :root { --ink:#222; --muted:#666; --line:#cfcfcf; --accent:#0f5c2f; }
    * { box-sizing:border-box; }
    body { font-family: Arial, sans-serif; color:var(--ink); margin:0; background:#f3faf6; }
    .sheet { max-width:900px; margin:24px auto; background:#fff; border:1px solid #ddd; padding:28px; }
    h1 { margin:0 0 6px; color:var(--accent); font-size:28px; }
    .sub { color:var(--muted); margin-bottom:18px; }
    .grid { display:grid; grid-template-columns:2fr 1fr 1fr; gap:12px; }
    .line { border:1px solid var(--line); min-height:38px; padding:8px; margin-bottom:10px; }
    .box { border:1px solid var(--line); padding:12px; margin-top:10px; }
    .label { font-weight:700; margin-bottom:8px; }
    .entry { border-bottom:1px dashed var(--line); min-height:30px; margin-bottom:8px; }
    .entry:last-child { margin-bottom:0; }
    .actions { margin-top:14px; }
    button { border:1px solid #999; background:#fff; padding:8px 12px; cursor:pointer; }
    @media print {
      body { background:#fff; }
      .sheet { border:none; margin:0; max-width:none; padding:12mm; }
      .actions { display:none; }
      @page { size:A4; margin:12mm; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <h1>Timed Test Book Template</h1>
    <div class="sub">Use this for full exam-condition tracking and review.</div>

    <div class="grid">
      <div class="line"><strong>Test Name:</strong></div>
      <div class="line"><strong>Duration:</strong></div>
      <div class="line"><strong>Score:</strong></div>
    </div>

    <div class="box">
      <div class="label">Time Lost Where</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">Accuracy by Topic</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">3 Biggest Lessons</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="box">
      <div class="label">Action List for Next Week</div>
      <div class="entry"></div><div class="entry"></div><div class="entry"></div><div class="entry"></div>
    </div>

    <div class="actions">
      <button onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>
</body>
</html>
