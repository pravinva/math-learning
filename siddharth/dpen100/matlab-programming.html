<script>
const modules = [
{
  id:'m1', week:'W2', title:'Data Types &amp; Operators',
  sections:[
    {h:'Numeric types', body:`
      <p>MATLAB stores numbers as <b>double</b> (floating point) by default — this is the type you get any time you type a number without thinking about it.</p>
      <ul>
        <li><b>Integers</b>: whole numbers only. Comes in 8-, 16-, 32- and 64-bit flavours (<code>int8</code>, <code>int16</code>, <code>int32</code>, <code>int64</code>). Bigger bit-width = larger range but more memory.</li>
        <li><b>Double (floating point)</b>: can store decimals. Range up to roughly 1.7977 &times; 10<sup>308</sup>. This is MATLAB's default numeric type — if you don't specify otherwise, a variable is a double.</li>
        <li><b>Single</b>: a smaller floating point type, max around 3.4028 &times; 10<sup>38</sup>. Less memory than double, less precision.</li>
        <li><b>Complex numbers</b>: created with <code>i</code> or <code>j</code>. Use <code>real()</code>, <code>imag()</code>, <code>conj()</code>, <code>abs()</code> and <code>angle()</code> to pull out parts, magnitude and phase.</li>
      </ul>
      <pre class="code"><span class="cm">% complex number example</span>
z = 3 + 4i;
mag = abs(z);      <span class="cm">% magnitude = 5</span>
ph  = angle(z);     <span class="cm">% phase angle in radians</span>
c   = conj(z);       <span class="cm">% 3 - 4i</span></pre>
    `},
    {h:'Arrays: vectors, matrices, cell arrays', body:`
      <p>What other languages call "arrays," MATLAB calls <b>vectors</b> and <b>matrices</b> — get comfortable with this naming early, it shows up constantly.</p>
      <ul>
        <li><b>Vector (1D array)</b> — built with square brackets, indexed starting at <b>1</b> (not 0).</li>
        <li><b>Matrix (2D array)</b> — rows and columns, indexed as <code>A(row, col)</code>.</li>
        <li><b>3D array</b> — adds a third index (row / column / "page").</li>
        <li><b>Cell array</b> — can hold mixed data types and sizes in each cell. Accessed with curly braces <code>{ }</code> instead of parentheses.</li>
      </ul>
      <pre class="code"><span class="cm">% vector</span>
v = [1 4 9 16 25];
v(3)          <span class="cm">% returns 9 — indexing starts at 1</span>

<span class="cm">% matrix</span>
A = [1 2; 3 4];
A(2,1)        <span class="cm">% returns 3</span>

<span class="cm">% cell array — mixed types</span>
c = {1, 'hello', [1 2 3]};
c{2}          <span class="cm">% returns 'hello'</span></pre>
      <div class="callout"><b>Common trip-up:</b> MATLAB indexes from 1. Python indexes from 0. If you're jumping between the two for DPEN100's Python week, this is the single most common source of off-by-one bugs.</div>
    `},
    {h:'Numeric operators &amp; logical values', body:`
      <p>Standard arithmetic (<code>+ - * / ^</code>) works element-wise only when you add a dot: <code>.* ./ .^</code>. Without the dot, MATLAB tries matrix multiplication/division rules instead.</p>
      <pre class="code">a = [1 2 3];
b = [4 5 6];
a .* b   <span class="cm">% [4 10 18]  — element-wise</span>
a * b'   <span class="cm">% 32         — matrix (dot) product, note the transpose</span></pre>
      <p>Logical values in MATLAB are <code>true (1)</code> or <code>false (0)</code> — comparisons like <code>a > b</code> return an array of these.</p>
    `}
  ],
  questions:[
    {q:'What is the default numeric type in MATLAB when you type <code>x = 5</code>?', a:'Double (floating point). Even whole-looking numbers are stored as doubles unless you explicitly cast them, e.g. with <code>int32(5)</code>.'},
    {q:'Given <code>v = [10 20 30 40]</code>, what does <code>v(2)</code> return, and why is this different from Python?', a:'It returns <b>20</b>. MATLAB indexing starts at 1, so <code>v(1)</code> is the first element. In Python, <code>v[2]</code> would return the third element (30) because Python indexes from 0.'},
    {q:'What is the difference between <code>A*B</code> and <code>A.*B</code> for two same-sized matrices?', a:'<code>A*B</code> performs matrix multiplication (rows-by-columns, dimensions must be compatible). <code>A.*B</code> performs element-wise multiplication — each element multiplied by the corresponding element in the same position.'},
    {q:'How do you access the second element of a cell array <code>c</code>, and why not use <code>c(2)</code>?', a:'Use curly braces: <code>c{2}</code>. Parentheses <code>c(2)</code> return a 1x1 cell (a "box" containing the value), while curly braces unwrap the box and give you the value itself.'}
  ]
},
{
  id:'m2', week:'W3', title:'Problem Solving &amp; Flow Charts',
  sections:[
    {h:'Why flow charts first', body:`
      <p>Before writing code, DPEN100 wants you to sketch the logic as a flow chart. This matters more than it seems — it forces you to nail down decision points and loop conditions before syntax gets in the way.</p>
      <ul>
        <li><b>Oval</b> — start / end</li>
        <li><b>Rectangle</b> — a process or calculation step</li>
        <li><b>Diamond</b> — a decision point (yes/no branch)</li>
        <li><b>Parallelogram</b> — input or output</li>
        <li><b>Arrows</b> — direction of flow</li>
      </ul>
      <p>A good habit: for any problem, write the flow chart, then translate each shape almost 1:1 into MATLAB — diamonds become <code>if</code> statements, loops-back-arrows become <code>for</code>/<code>while</code>.</p>
    `},
    {h:'Problem-solving process', body:`
      <ul>
        <li><b>1. Understand the problem</b> — what are the known inputs, what output is required?</li>
        <li><b>2. Plan</b> — flow chart or pseudocode.</li>
        <li><b>3. Code</b> — translate the plan into MATLAB.</li>
        <li><b>4. Test</b> — check with known values (edge cases especially: zero, negative, empty input).</li>
        <li><b>5. Refine</b> — clean up, comment, remove repetition.</li>
      </ul>
    `}
  ],
  questions:[
    {q:'What flow chart shape represents a decision point, e.g. "is x > 0?"', a:'A diamond. It has two (or more) exit arrows corresponding to the possible outcomes (e.g. yes/no).'},
    {q:'Why plan with a flow chart before writing MATLAB code, rather than just diving in?', a:'It separates the logic of the solution from the syntax of the language. This makes it easier to catch a flawed approach early and makes translating to code (or even to a different language, like Python in Week 13) far more direct.'}
  ]
},
{
  id:'m3', week:'W4', title:'Control Flow Constructs',
  sections:[
    {h:'if / elseif / else', body:`
      <ul>
        <li><b>if</b> — runs the block if the condition is true.</li>
        <li><b>else</b> — runs if the condition was false.</li>
        <li><b>elseif</b> — checks another condition if the previous one(s) were false.</li>
      </ul>
      <pre class="code">score = 72;
if score >= 85
    grade = 'HD';
elseif score >= 75
    grade = 'D';
elseif score >= 65
    grade = 'C';
else
    grade = 'F';
end</pre>
      <p><b>When to use which pattern:</b></p>
      <ul>
        <li><b>Simple if-else</b> — one condition, single yes/no fork.</li>
        <li><b>if-elseif-else chain</b> — a range of conditions in a logical sequence (grading systems, categorising data — exactly the example above).</li>
        <li><b>Nested if</b> — when a primary condition needs a further check inside it (e.g. check score range, then within that check attendance).</li>
      </ul>
    `},
    {h:'Logical operators', body:`
      <p>Combine multiple conditions into one decision:</p>
      <ul>
        <li><code>&amp;&amp;</code> — AND (both must be true)</li>
        <li><code>||</code> — OR (at least one must be true)</li>
        <li><code>~</code> — NOT</li>
      </ul>
      <pre class="code">if age >= 18 && hasLicense
    disp('Can drive')
end</pre>
      <div class="callout"><b>Common trip-up:</b> <code>&&</code> and <code>||</code> short-circuit and only work on single logical values (scalars). For element-wise comparison across whole arrays, use <code>&</code> and <code>|</code> instead.</div>
    `},
    {h:'For loops, nested loops, and while loops', body:`
      <ul>
        <li><b>for loop</b> — use when you know exactly how many times it should run.</li>
        <li><b>nested for loop</b> — a loop inside a loop, needed when iterating over something like a matrix (rows and columns).</li>
        <li><b>while loop</b> — use when you only know the stopping <i>condition</i>, not the exact iteration count.</li>
      </ul>
      <pre class="code"><span class="cm">% for loop</span>
total = 0;
for i = 1:10
    total = total + i;
end

<span class="cm">% nested for — iterating a matrix</span>
A = magic(3);
for r = 1:3
    for c = 1:3
        fprintf('%d ', A(r,c));
    end
end

<span class="cm">% while loop</span>
x = 100;
count = 0;
while x > 1
    x = x / 2;
    count = count + 1;
end</pre>
    `}
  ],
  questions:[
    {q:'You need to categorise exam scores into HD/D/C/P/F bands. Which control-flow pattern fits best, and why?', a:'An <b>if-elseif-else chain</b>. The bands form a logical, ordered sequence of ranges — exactly the case this pattern is designed for, as opposed to a single yes/no fork or a nested check.'},
    {q:'What is the key difference between choosing a <code>for</code> loop vs a <code>while</code> loop?', a:'Use a <code>for</code> loop when you know the exact number of iterations in advance. Use a <code>while</code> loop when you only know the condition that should stop the loop, and the number of iterations isn\'t known ahead of time.'},
    {q:'Why would <code>if a && b</code> throw an error if <code>a</code> is a 1x3 array?', a:'<code>&&</code> requires scalar (single-value) logical operands — it short-circuits based on one true/false value. For array-wise comparisons, use the non-short-circuit <code>&</code> operator instead, e.g. <code>if all(a & b)</code>.'}
  ]
},
{
  id:'m4', week:'W5', title:'Functions &amp; Modular Programming',
  sections:[
    {h:'What is a function?', body:`
      <p>A function is a reusable block of code that performs a specific task. It takes <b>inputs</b> (parameters/arguments), processes them, and (usually) returns an <b>output</b>.</p>
      <pre class="code">function avg = calcAverage(values)
    avg = sum(values) / length(values);
end

<span class="cm">% calling it</span>
result = calcAverage([4 8 15 16 23]);</pre>
      <p>A MATLAB function file typically has the same name as the function itself (<code>calcAverage.m</code>) and the <code>function</code> keyword must be the first line.</p>
    `},
    {h:'Modular vs non-modular programming', body:`
      <table style="width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;">
        <tr style="background:#f4f7fb;"><th style="text-align:left;padding:8px;border:1px solid var(--line);">Modular</th><th style="text-align:left;padding:8px;border:1px solid var(--line);">Non-modular</th></tr>
        <tr><td style="padding:8px;border:1px solid var(--line);">Breaks code into smaller, manageable parts (functions, loops). Functions can call other functions.</td><td style="padding:8px;border:1px solid var(--line);">All code written as one continuous block with no separation between logical steps.</td></tr>
      </table>
      <p>Modular code is easier to test (test each function alone), easier to reuse, and easier to debug (isolate which function is wrong).</p>
    `},
    {h:'Recursive programming', body:`
      <ul>
        <li>Recursion is a <b>divide-and-conquer</b> technique: a function calls itself with a smaller version of the same problem.</li>
        <li>Must always have a <b>base case</b> — a condition where it stops calling itself. Without one, recursion never terminates.</li>
        <li>Classic example: factorial, <code>n! = n &times; (n-1)!</code></li>
      </ul>
      <pre class="code">function result = factorial_r(n)
    if n <= 1          <span class="cm">% base case — stops the recursion</span>
        result = 1;
    else
        result = n * factorial_r(n-1);   <span class="cm">% recursive call</span>
    end
end</pre>
    `}
  ],
  questions:[
    {q:'What two things does a function always need conceptually, beyond its name?', a:'Inputs (parameters/arguments it receives) and, usually, an output (the value it returns) — though functions can technically have zero of either.'},
    {q:'Why does every recursive function need a base case?', a:'Without a base case, the function keeps calling itself indefinitely with no way to stop, causing infinite recursion (and eventually a stack overflow error). The base case is the condition that halts further recursive calls.'},
    {q:'Give one practical benefit of modular programming over writing one long block of code.', a:'Any of: easier to test in isolation, easier to reuse elsewhere, easier to debug (you can pinpoint which function misbehaves), easier to read and maintain.'}
  ]
},
{
  id:'m5', week:'W6', title:'Graphics &amp; Visualisation',
  sections:[
    {h:'Basic plotting', body:`
      <p><code>linspace(start, stop, n)</code> generates <code>n</code> evenly spaced values between <code>start</code> and <code>stop</code>, inclusive of both endpoints. It's the standard way to build a smooth x-axis for plotting — you tell it <b>how many points you want</b>, not the step size.</p>
      <pre class="code">linspace(0, 10, 5)
<span class="cm">% returns: 0  2.5  5  7.5  10</span></pre>
      <p><b>linspace vs the colon operator</b> — both can build the same vector, but you specify a different thing:</p>
      <pre class="code">linspace(0, 10, 5)   <span class="cm">% you specify the COUNT of points (5)</span>
0:2.5:10              <span class="cm">% you specify the STEP size (2.5) — same result</span></pre>
      <p>Rule of thumb: use <b>linspace</b> when you know how many points you want (e.g. "100 points for a smooth curve"). Use <b>a:step:b</b> when you know the exact step size (e.g. "every 0.1 seconds").</p>
      <div class="callout"><b>Note:</b> some study notes misspell this as "Linscape" — the real function name is <b>linspace</b> (line + space).</div>
      <pre class="code">x = linspace(0, 2*pi, 100);
y = sin(x);
plot(x, y);
xlabel('x'); ylabel('sin(x)'); title('Sine wave');
grid on;</pre>
    `},
    {h:'Multiple plots on the same axis, and subplots', body:`
      <pre class="code"><span class="cm">% multiple plots, same axis</span>
plot(x, sin(x)); hold on;
plot(x, cos(x));
legend('sin(x)', 'cos(x)');
hold off;

<span class="cm">% subplots — separate panels in one figure</span>
subplot(2,1,1); plot(x, sin(x)); title('sin');
subplot(2,1,2); plot(x, cos(x)); title('cos');</pre>
      <p><code>subplot(rows, cols, index)</code> — think of it as slicing the figure into a grid, then picking which cell to draw into next.</p>
    `},
    {h:'3D, logarithmic and polar plots', body:`
      <ul>
        <li><b>3D graphing</b>: <code>plot3(x,y,z)</code> or <code>surf(X,Y,Z)</code> for surfaces.</li>
        <li><b>semilogx</b> — logarithmic scale on the x-axis only.</li>
        <li><b>semilogy</b> — logarithmic scale on the y-axis only.</li>
        <li><b>loglog</b> — logarithmic scale on both axes. Use when data spans several orders of magnitude.</li>
        <li><b>polar plots</b> — <code>polarplot(theta, r)</code> for angle/radius data.</li>
      </ul>
    `}
  ],
  questions:[
    {q:'You have data spanning from 1 to 1,000,000 on the y-axis and want to see detail across the whole range. Which plot type fits best?', a:'<code>semilogy</code> (or <code>loglog</code> if the x-axis also spans a huge range). A logarithmic scale compresses large ranges so smaller values remain visible instead of being squashed near zero.'},
    {q:'What does <code>subplot(2,2,3)</code> do?', a:'Sets up a 2x2 grid of plot panels within the figure, and selects the 3rd panel (bottom-left, since MATLAB numbers subplot positions left-to-right, top-to-bottom) as the target for the next plotting command.'},
    {q:'What is <code>linspace(0, 10, 5)</code> equivalent to conceptually, and how is it different from <code>0:2.5:10</code>?', a:'Both return <code>[0 2.5 5 7.5 10]</code> — 5 evenly spaced values between 0 and 10 inclusive. The difference is what you specify: <code>linspace</code> takes the number of points you want (5), while the colon operator takes the step size (2.5). Use linspace when you know the point count; use the colon operator when you know the exact step.'}
  ]
},
{
  id:'m6', week:'W7', title:'File Input &amp; Output',
  sections:[
    {h:'Why import/export data', body:`
      <p>Real engineering data usually comes from somewhere else — a sensor log, a spreadsheet, a GPS device. MATLAB can read these files in for analysis and write results back out.</p>
    `},
    {h:'Common functions', body:`
      <pre class="code"><span class="cm">% reading a CSV / delimited text file</span>
data = readmatrix('sensor_data.csv');

<span class="cm">% reading with more control (headers, mixed types)</span>
T = readtable('results.csv');

<span class="cm">% writing data out</span>
writematrix(data, 'output.csv');</pre>
    `},
    {h:'Delimited text files', body:`
      <p>Not every file uses a comma as the separator. When the delimiter is something else (tab, semicolon, space), you need to tell MATLAB explicitly:</p>
      <pre class="code">data = readmatrix('data.txt', 'Delimiter', ';');</pre>
    `}
  ],
  questions:[
    {q:'What is the difference between <code>readmatrix</code> and <code>readtable</code>?', a:'<code>readmatrix</code> returns a plain numeric matrix — good for pure numeric data. <code>readtable</code> returns a table object that preserves column headers and can mix data types per column (numbers, strings, dates) — better for structured, labelled datasets.'},
    {q:'A text file uses semicolons instead of commas to separate values. How do you read it correctly in MATLAB?', a:"Specify the delimiter explicitly, e.g. <code>readmatrix('data.txt', 'Delimiter', ';')</code>. Without this, MATLAB assumes the default comma delimiter and will misread the file."}
  ]
},
{
  id:'m7', week:'W8', title:'Rectilinear Motion',
  sections:[
    {h:'Core relationships', body:`
      <p>Rectilinear motion is motion along a <b>straight line</b>. Position, velocity and acceleration are linked by calculus:</p>
      <ul>
        <li>Differentiate <b>position</b> → get <b>velocity</b></li>
        <li>Differentiate <b>velocity</b> → get <b>acceleration</b></li>
        <li>Integrate the reverse direction to go back</li>
      </ul>
      <p>In MATLAB, the <code>diff</code> function approximates a numeric derivative from a data series — this is exactly how the coursework's kinematic plotting project turns raw position data into velocity and acceleration.</p>
      <pre class="code">t = 0:0.1:10;
s = 5*t.^2;          <span class="cm">% position</span>
v = diff(s)./diff(t); <span class="cm">% approximate velocity</span>
a = diff(v)./diff(t(1:end-1)); <span class="cm">% approximate acceleration</span></pre>
    `},
    {h:'Finding total distance travelled', body:`
      <ol style="padding-left:20px;">
        <li>Find critical points where motion changes direction — set the <b>velocity</b> equation to zero and solve.</li>
        <li>Compute the position at each critical point, plus the start and end times.</li>
        <li>Sum the absolute distances between consecutive points.</li>
      </ol>
      <div class="callout"><b>Why this matters:</b> total distance ≠ displacement. If the particle reverses direction partway through, displacement can be small (or zero) while total distance travelled is large. Always check for a direction change first.</div>
    `},
    {h:'Finding maximum velocity', body:`
      <ol style="padding-left:20px;">
        <li>Set the <b>acceleration</b> equation equal to zero and solve for time — this is the instant velocity is at a turning point.</li>
        <li>Substitute that time back into the <b>velocity</b> equation to get the actual maximum (or minimum) velocity value.</li>
      </ol>
    `}
  ],
  questions:[
    {q:'A particle\'s velocity function is v(t) = 6t − 12. At what critical time(s) does the particle change direction, and how would you use this to find total distance travelled?', a:'Set v(t) = 0: 6t − 12 = 0 → t = 2. This is the critical point. To find total distance, compute the position s(t) at t=2, plus at the start and end of the interval in question, then sum the absolute distances between consecutive points rather than just subtracting start from end position.'},
    {q:'How do you find the time at which velocity is maximum, given an acceleration function a(t)?', a:'Set a(t) = 0 and solve for t (since acceleration is the derivative of velocity, a turning point in velocity occurs where acceleration is zero). Substitute that t back into v(t) to get the actual maximum velocity value.'},
    {q:'Why is displacement not always the same as total distance travelled?', a:'Displacement is the net change in position (end minus start), while total distance sums up every bit of path length travelled, including any backtracking. If a particle reverses direction, distance keeps accumulating even while displacement may decrease or return to zero.'}
  ]
},
{
  id:'m8', week:'W9', title:'Curvilinear Motion',
  sections:[
    {h:'Motion along a curved path', body:`
      <p>Curvilinear motion sits on a <b>curved</b> path rather than a straight line, so it needs to be broken into components. Three coordinate systems come up:</p>
      <ul>
        <li><b>Cartesian (x, y, z)</b> — perpendicular axes through a fixed origin. Most common starting point.</li>
        <li><b>Normal-tangential (n, t)</b> — origin travels with the object; t-axis points along the direction of motion, n-axis points toward the centre of curvature.</li>
        <li><b>Cylindrical (r, θ, z)</b> — position defined by a radius, angle and height from a reference axis/plane.</li>
      </ul>
    `},
    {h:'Projectile motion', body:`
      <p>The classic curvilinear example. The trick is to <b>split into x and y components and solve independently</b>, then combine:</p>
      <ul>
        <li><b>Horizontal (x)</b>: zero acceleration → constant velocity.</li>
        <li><b>Vertical (y)</b>: constant acceleration (gravity, <code>g</code>) throughout the flight.</li>
      </ul>
      <p>Solve the two sets of equations simultaneously (they share the same time variable, <code>t</code>) to find things like range, max height, or time of flight.</p>
      <pre class="code">v0 = 20;      <span class="cm">% initial speed (m/s)</span>
theta = 45;   <span class="cm">% launch angle (deg)</span>
g = 9.81;
vx = v0*cosd(theta);   <span class="cm">% constant — horizontal</span>
vy0 = v0*sind(theta);  <span class="cm">% initial vertical component</span>

t = linspace(0, 2*vy0/g, 100);
x = vx*t;
y = vy0*t - 0.5*g*t.^2;
plot(x,y); xlabel('Range (m)'); ylabel('Height (m)');</pre>
    `}
  ],
  questions:[
    {q:'In projectile motion, why is the horizontal component solved separately from the vertical component?', a:'Because they experience different accelerations — horizontal acceleration is zero (constant velocity), while vertical acceleration is constant due to gravity. Splitting into independent x/y equations lets each be solved with simple kinematics, then recombined using the shared time variable to describe the full curved path.'},
    {q:'What is the key difference between the normal-tangential coordinate system and the cartesian system?', a:'Cartesian axes are fixed in space. The normal-tangential system\'s origin travels with the moving object — its tangential (t) axis always points along the current direction of motion, and the normal (n) axis always points toward the centre of curvature, so the axes themselves rotate as the object moves along the curve.'}
  ]
},
{
  id:'m9', week:'W11', title:'Advanced Data Structures',
  sections:[
    {h:'Beyond basic arrays', body:`
      <p>Building on Week 2's data types, more advanced problems need structures that organise mixed or hierarchical data cleanly.</p>
      <ul>
        <li><b>Structures (struct)</b> — group related data under named fields, similar to a record.</li>
        <li><b>Cell arrays revisited</b> — useful for holding variable-length or mixed-type collections (e.g. a list of student records each with different numbers of subjects).</li>
        <li><b>Preallocation</b> — declaring an array's full size before a loop fills it in (<code>zeros(1,n)</code>) is significantly faster than growing an array one element at a time.</li>
      </ul>
      <pre class="code">student.name = 'Siddharth';
student.marks = [78 85 91];
student.average = mean(student.marks);

<span class="cm">% preallocation before a loop</span>
result = zeros(1,1000);
for i = 1:1000
    result(i) = i^2;
end</pre>
    `},
    {h:'Programming techniques', body:`
      <ul>
        <li><b>Vectorisation</b> — replacing an explicit loop with a single operation across a whole array (e.g. <code>y = x.^2</code> instead of looping element-by-element). MATLAB is optimised for this and it's usually faster.</li>
        <li><b>Logical indexing</b> — selecting elements of an array using a condition instead of explicit indices, e.g. <code>x(x > 0)</code> returns only the positive elements.</li>
      </ul>
      <pre class="code">x = [-3 5 -1 8 2 -6];
positives = x(x > 0);   <span class="cm">% [5 8 2] — logical indexing</span></pre>
    `}
  ],
  questions:[
    {q:'Why is preallocating an array with <code>zeros(1,n)</code> before a loop generally faster than growing it inside the loop?', a:"When an array grows dynamically (e.g. result(i) = ... with no preallocation), MATLAB has to reallocate memory and copy the entire array each time it grows. Preallocating reserves the full block of memory upfront, so each loop iteration just writes into existing space instead of triggering a resize."},
    {q:'Given <code>x = [-3 5 -1 8 2 -6]</code>, what does <code>x(x > 0)</code> return and what technique is this?', a:'It returns <code>[5 8 2]</code> — this is logical indexing. <code>x > 0</code> produces a logical array of trues/falses the same size as x, and using that as an index selects only the elements where the condition was true.'}
  ]
},
{
  id:'m10', week:'W12-13', title:'Algorithms &amp; Python Transition',
  sections:[
    {h:'Algorithmic thinking', body:`
      <p>Week 12 pulls together control flow, functions and data structures into full algorithms — e.g. sorting, searching, or simulating a process step by step. The flow-chart-first habit from Week 3 pays off here: complex algorithms are just several simple constructs chained together.</p>
    `},
    {h:'MATLAB → Python: key differences', body:`
      <div class="pycompare"><b>Indexing:</b> MATLAB starts at 1. Python starts at 0. This is the single biggest source of translation bugs.</div>
      <div class="pycompare"><b>Line endings:</b> MATLAB commands often end in <code>;</code> (suppresses output). Python needs no semicolon — a new line ends the statement, and output is never printed automatically unless you call <code>print()</code>.</div>
      <div class="pycompare"><b>Code blocks:</b> MATLAB uses <code>end</code> to close blocks (if/for/while/function). Python uses indentation (whitespace) instead — no <code>end</code> keyword at all.</div>
      <div class="pycompare"><b>Data types:</b> Python variables are dynamically typed automatically on assignment — no declaration needed. Use <code>type(variable_name)</code> to check a type.</div>
      <div class="pycompare"><b>Arrays vs lists:</b> MATLAB's native structure is the matrix. Python's native structure is the list — square brackets <code>[ ]</code>, mutable. For real matrix math, Python typically imports <b>NumPy</b> (<code>import numpy as np</code>).</div>
      <pre class="code"><span class="cm">% MATLAB</span>
for i = 1:5
    disp(i)
end

<span class="cm"># Python equivalent</span>
for i in range(1, 6):
    print(i)</pre>
    `},
    {h:'Plotting and matrices in Python', body:`
      <ul>
        <li><b>matplotlib.pyplot</b> is Python's equivalent to MATLAB's plotting: <code>plt.plot(x, y, label='data')</code>, <code>plt.xlabel()</code>, <code>plt.legend()</code>, <code>plt.show()</code>.</li>
        <li><b>NumPy</b> handles matrix work: <code>np.multiply()</code> for element-wise multiplication (like MATLAB's <code>.*</code>), <code>np.matmul()</code> for true matrix multiplication (like MATLAB's <code>*</code>).</li>
        <li>Logarithmic plots: <code>plt.xscale('log')</code> / <code>plt.yscale('log')</code> instead of MATLAB's <code>semilogx</code>/<code>semilogy</code>.</li>
      </ul>
    `}
  ],
  questions:[
    {q:'Translate this MATLAB snippet\'s logic into Python, noting the indexing difference: <code>v = [10 20 30]; disp(v(1))</code>', a:"In MATLAB, <code>v(1)</code> returns 10 (the first element, 1-indexed). In Python, the equivalent list is <code>v = [10, 20, 30]</code>, and the first element is accessed as <code>v[0]</code>, printed with <code>print(v[0])</code> — also returning 10, but via index 0, not 1."},
    {q:'What replaces MATLAB\'s <code>end</code> keyword in Python for closing an if/for/while block?', a:"Nothing explicit — Python uses indentation (consistent whitespace) to define where a code block starts and ends, rather than an end keyword or curly braces."},
    {q:'In NumPy, what is the difference between <code>np.multiply(A,B)</code> and <code>np.matmul(A,B)</code>?', a:'<code>np.multiply(A,B)</code> performs element-wise multiplication (like MATLAB\'s <code>.*</code>). <code>np.matmul(A,B)</code> performs true matrix multiplication (like MATLAB\'s <code>*</code>), following standard rows-by-columns matrix rules.'}
  ]
},
{
  id:'m11', week:'REF', title:'Reference Chart: Which Structure?',
  sections:[
    {h:'How to use this chart', body:`
      <p>Before picking a MATLAB construct, work out what <i>kind</i> of problem you're looking at. Most exam questions are really just one or two of these, chained together.</p>
    `},
    {h:'Decision structures — choosing between outcomes', body:`
      <ul>
        <li><b>One yes/no fork</b> → <code>if / else</code></li>
        <li><b>Ordered ranges</b> (grades, tiers, categories) → <code>if / elseif / else</code> chain</li>
        <li><b>A condition needs a further check inside it</b> → nested <code>if</code></li>
        <li><b>Several conditions must ALL or ANY be true</b> → <code>&amp;&amp;</code> / <code>||</code> combined with <code>if</code></li>
      </ul>
    `},
    {h:'Repetition structures — repeating something', body:`
      <ul>
        <li><b>You know exactly how many times to repeat</b> → <code>for</code> loop</li>
        <li><b>You only know the stopping condition, not the count</b> → <code>while</code> loop</li>
        <li><b>Iterating rows AND columns</b> (a matrix, a grid) → nested <code>for</code> loop</li>
        <li><b>Same operation on every element, no branching</b> → vectorisation instead of a loop</li>
      </ul>
    `},
    {h:'Organisational structures — how data or code is grouped', body:`
      <ul>
        <li><b>A calculation you'll reuse in multiple places</b> → function</li>
        <li><b>Problem defined in terms of a smaller version of itself</b> (factorial, Fibonacci) → recursion (always needs a base case)</li>
        <li><b>Related values belonging to one "thing"</b> (name + marks + average) → struct</li>
        <li><b>A collection where items differ in type or size</b> → cell array</li>
        <li><b>A simple list of same-type numbers</b> → vector / array</li>
      </ul>
      <div class="callout"><b>Quick diagnostic when stuck:</b> (1) Does it need a decision? → if-family. (2) Does it repeat, and is the count known or condition-based? → for vs while. (3) Is the same logic needed more than once, or is the problem recursive? → function / recursion. (4) Is the data itself mixed or grouped? → struct or cell array over a plain vector.</div>
    `}
  ],
  questions:[]
},
{
  id:'m12', week:'REAL', title:'Real ENGG100 Examples',
  sections:[
    {h:'Real exam format (from the subject outline)', body:`
      <p>Good to know exactly what you're walking into — neither final exam is fully open-book:</p>
      <ul>
        <li><b>Final Dynamics Exam</b> — 20% · 1 hour · restricted resources allowed · covers rectilinear + curvilinear motion (Weeks 8–9) · 40% minimum to avoid Technical Fail</li>
        <li><b>Final Programming Exam</b> — 30% · 2 hours (1hr theory + 1hr practical) · restricted resources allowed · covers Weeks 2–7, 11–13 · 40% minimum to avoid Technical Fail</li>
      </ul>
    `},
    {h:'Real if-elseif grading example (from ENGG100 notes)', body:`
      <pre class="code">grade = 67;
if grade >= 90
    disp('A');
elseif grade >= 80
    disp('B');
elseif grade >= 70
    disp('C');
elseif grade >= 60
    disp('D');
else
    disp('F');
end
<span class="cm">% Output: D</span></pre>
    `},
    {h:'Real recursion example — Fibonacci (from ENGG100 notes)', body:`
      <p>Notice the <b>two</b> base cases here, since Fibonacci depends on the two previous terms, not just one — unlike the single-base-case factorial example earlier in this guide.</p>
      <pre class="code">function answer = fibonacci(n)
    if n == 0
        answer = 0;      <span class="cm">% base case 1</span>
    elseif n == 1
        answer = 1;      <span class="cm">% base case 2</span>
    else
        answer = fibonacci(n-1) + fibonacci(n-2);  <span class="cm">% recursive case</span>
    end
end
<span class="cm">% fibonacci(9) returns 34</span></pre>
    `},
    {h:'Real rectilinear motion code — from the P:314 STRAVA major project', body:`
      <p>This is the actual pattern used to turn GPS position data into velocity, using <code>diff</code> exactly as covered in the Rectilinear Motion module:</p>
      <pre class="code"><span class="cm">% distance between consecutive GPS points, from the project's cumulative distance calc</span>
distance = cumsum(sqrt(diff(Final_Northing).^2 + diff(Final_Easting).^2 + diff(Final_Elevation).^2));

<span class="cm">% velocity — change in distance over change in time, converted to km/h</span>
hours = time./3600;
velocity = distance./hours;
plot(hours, velocity);
title('Time(h) vs. Velocity'); xlabel('Time(h)'); ylabel('Velocity(km/h)');</pre>
      <div class="callout"><b>Note:</b> the project used <code>cumsum(sqrt(diff(x)^2+diff(y)^2+diff(z)^2))</code> as its core distance formula — the same distance formula from the motion modules, just applied cumulatively over many points instead of two.</div>
    `},
    {h:'Real tangential acceleration example (Challenge Problem 1)', body:`
      <pre class="code">velocity_ms = velocity_kmhr./3.6;              <span class="cm">% convert km/h to m/s</span>
vDiff = [0; diff(velocity_ms)];                 <span class="cm">% change in velocity between points</span>
at = velocity_ms.*(vDiff./RawData(:,17));        <span class="cm">% tangential acceleration formula</span>
plot(time2, at);
title('Tangential Acceleration vs Time');
xlabel('Time (seconds)'); ylabel('Tangential Acceleration (m/s^-2)');</pre>
    `},
    {h:'Real formula-chaining example — cycling power (Challenge Problem 2)', body:`
      <p>Shows how several dynamics formulas combine into one MATLAB calculation — a good model for how exam questions often chain multiple concepts together:</p>
      <pre class="code">g = 9.81;                                       <span class="cm">% gravity constant</span>
Fg = g.*sin(atan(slope)).*(M+m);                <span class="cm">% resistance force due to gravity</span>
Fr = g.*cos(atan(slope)).*(M+m).*Crr;           <span class="cm">% rolling resistance force</span>
Fa = 1/2.*cda.*p.*(v+w);                        <span class="cm">% aerodynamic drag</span>
P  = ((Fg+Fr+Fa).*v)./(1-loss);                 <span class="cm">% power formula — combines all three forces</span>
plot(time, P); xlabel('Time (s)'); ylabel('Power (W)');</pre>
      <div class="callout"><b>Takeaway for the exam:</b> real ENGG100 questions rarely test one concept in isolation. The project shows the typical pattern — a loop or vector operation, feeding a dynamics formula, feeding a plot. Practice spotting all three layers in a question, not just the one it seems to be asking about.</div>
    `}
  ],
  questions:[
    {q:'Why does the Fibonacci function need two base cases (n==0 and n==1) instead of just one?', a:'Because each Fibonacci term depends on the <i>two</i> preceding terms, not one. A single base case (like factorial\'s n<=1) wouldn\'t give the recursion enough starting information — it needs both F(0) and F(1) defined before F(n-1)+F(n-2) can resolve down to real numbers.'},
    {q:'In the real project code, what does <code>cumsum(sqrt(diff(x).^2 + diff(y).^2 + diff(z).^2))</code> calculate?', a:'The cumulative distance travelled along a 3D path. <code>diff(x)</code>, <code>diff(y)</code>, <code>diff(z)</code> give the change in each coordinate between consecutive points; squaring, summing and square-rooting gives the straight-line distance between each pair of points (Pythagoras in 3D); <code>cumsum</code> then adds these up running-total style to give total distance travelled at each point in time.'}
  ]
}
];

let currentIndex = 0;
const doneSet = new Set();

function renderNav(){
  const nav = document.getElementById('module-nav');
  nav.innerHTML = '';
  modules.forEach((m, idx) => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (idx === currentIndex ? ' active' : '') + (doneSet.has(m.id) ? ' done' : '');
    item.innerHTML = `<span class="wk">${m.week}</span><span class="chk">${doneSet.has(m.id) ? '✓' : ''}</span><span>${m.title}</span>`;
    item.addEventListener('click', () => { currentIndex = idx; renderAll(); });
    nav.appendChild(item);
  });
  updateProgress();
}

function updateProgress(){
  const count = doneSet.size;
  document.getElementById('progress-count').textContent = `${count} / ${modules.length}`;
  document.getElementById('progress-bar-fill').style.width = `${(count/modules.length)*100}%`;
}

function renderMain(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const m = modules[currentIndex];

  const header = document.createElement('div');
  header.className = 'module-header';
  header.innerHTML = `
    <div><div class="tag">${m.week} · SYLLABUS TOPIC</div><h2>${m.title}</h2></div>
    <button class="mark-done-btn ${doneSet.has(m.id) ? 'done' : ''}" id="mark-done">${doneSet.has(m.id) ? '✓ Completed' : 'Mark as done'}</button>
  `;
  main.appendChild(header);

  m.sections.forEach(s => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<h3>${s.h}</h3>${s.body}`;
    main.appendChild(sec);
  });

  if(m.questions && m.questions.length){
    const qSection = document.createElement('div');
    qSection.className = 'section';
    qSection.innerHTML = '<h3>Practice Questions</h3>';
    m.questions.forEach((q, i) => {
      const box = document.createElement('div');
      box.className = 'qbox';
      box.innerHTML = `
        <div class="qhead">
          <div><span class="qnum">Q${i+1}</span><span class="qtitle">${q.q}</span></div>
          <span class="toggle-icon">▾</span>
        </div>
        <div class="answer">${q.a}</div>
      `;
      box.querySelector('.qhead').addEventListener('click', () => box.classList.toggle('open'));
      qSection.appendChild(box);
    });
    main.appendChild(qSection);
  }

  const footnav = document.createElement('div');
  footnav.className = 'footnav';
  footnav.innerHTML = `
    <button id="prev-btn" ${currentIndex === 0 ? 'disabled' : ''}>&larr; Previous</button>
    <button id="next-btn" ${currentIndex === modules.length-1 ? 'disabled' : ''}>Next &rarr;</button>
  `;
  main.appendChild(footnav);

  document.getElementById('mark-done').addEventListener('click', () => {
    if(doneSet.has(m.id)){ doneSet.delete(m.id); } else { doneSet.add(m.id); }
    renderAll();
  });
  document.getElementById('prev-btn').addEventListener('click', () => { if(currentIndex>0){ currentIndex--; renderAll(); window.scrollTo(0,0); }});
  document.getElementById('next-btn').addEventListener('click', () => { if(currentIndex<modules.length-1){ currentIndex++; renderAll(); window.scrollTo(0,0); }});
}

function renderAll(){
  renderNav();
  renderMain();
}

renderAll();
</script>
